<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta
    name="description"
    content="RIMS NICU Tracker with Firebase Authentication, Google sign-in, Firestore live sync, flexible admissions, and Excel export."
  />
  <title>RIMS NICU Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'" />
  <style>
:root {
  --bg: #eef6fb;
  --bg-2: #e3eff8;
  --surface: rgba(255, 255, 255, 0.92);
  --surface-strong: #ffffff;
  --surface-soft: #f5fbff;
  --line: #d9e6ef;
  --line-strong: #bdd4e3;
  --text: #163246;
  --muted: #698396;
  --primary: #1f86c7;
  --primary-2: #38b6a6;
  --success: #1f8b67;
  --warning: #b77c1e;
  --danger: #c74662;
  --shadow: 0 20px 48px rgba(22, 50, 70, 0.12);
  --radius: 24px;
  --sidebar: 292px;
}

* {
  box-sizing: border-box;
}

html,
body {
  margin: 0;
  min-height: 100%;
  font-family: "Inter", system-ui, sans-serif;
  color: var(--text);
  background: linear-gradient(180deg, var(--bg), var(--bg-2));
}

body {
  overflow-x: hidden;
}

button,
input,
select,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
  border: none;
}

h1,
h2,
h3,
h4,
p {
  margin: 0;
}

a {
  color: inherit;
}

.hidden {
  display: none !important;
}

.app-shell {
  min-height: 100vh;
}

.auth-shell {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1.05fr 0.95fr;
  gap: 24px;
  max-width: 1440px;
  margin: 0 auto;
  padding: 28px;
}

.surface {
  background: var(--surface);
  backdrop-filter: blur(12px);
  border: 1px solid rgba(255, 255, 255, 0.7);
  box-shadow: var(--shadow);
  border-radius: var(--radius);
}

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-mark {
  width: 48px;
  height: 48px;
  border-radius: 16px;
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
  box-shadow: 0 14px 30px rgba(31, 134, 199, 0.24);
  position: relative;
  flex: none;
}

.logo-mark::before,
.logo-mark::after {
  content: "";
  position: absolute;
  background: #fff;
  border-radius: 999px;
}

.logo-mark::before {
  width: 12px;
  height: 30px;
  left: 18px;
  top: 9px;
}

.logo-mark::after {
  width: 30px;
  height: 12px;
  left: 9px;
  top: 18px;
}

.brand-copy strong {
  display: block;
  font-size: 1rem;
}

.brand-copy span {
  display: block;
  color: var(--muted);
  font-size: 0.9rem;
}

.auth-hero {
  padding: 32px;
  border-radius: 32px;
  background: linear-gradient(150deg, rgba(31, 134, 199, 0.13), rgba(56, 182, 166, 0.14), rgba(255, 255, 255, 0.78));
  border: 1px solid rgba(255, 255, 255, 0.7);
  position: relative;
  overflow: hidden;
}

.auth-hero::before,
.auth-hero::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
}

.auth-hero::before {
  width: 340px;
  height: 340px;
  right: -100px;
  top: -70px;
  background: radial-gradient(circle, rgba(56, 182, 166, 0.18), transparent 68%);
}

.auth-hero::after {
  width: 280px;
  height: 280px;
  left: -80px;
  bottom: -100px;
  background: radial-gradient(circle, rgba(31, 134, 199, 0.14), transparent 68%);
}

.eyebrow,
.pill,
.tag,
.outcome-pill {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 999px;
  font-size: 12px;
  font-weight: 700;
}

.eyebrow {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

.auth-title {
  margin-top: 18px;
  font-size: clamp(2rem, 4vw, 3.4rem);
  line-height: 1.03;
  max-width: 760px;
}

.auth-subtitle {
  margin-top: 14px;
  color: var(--muted);
  line-height: 1.7;
  max-width: 780px;
}

.hero-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 14px;
  margin-top: 28px;
}

.hero-stat,
.metric {
  padding: 16px;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.86);
}

.hero-stat .k,
.metric .k {
  font-size: 12px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 700;
}

.hero-stat .v,
.metric .v {
  margin-top: 8px;
  font-size: 1.6rem;
  font-weight: 800;
}

.hero-stat .s,
.metric .s {
  margin-top: 5px;
  font-size: 12px;
  color: var(--muted);
}

.auth-card,
.card,
.table-card,
.sheet-card,
.topbar,
.sidebar {
  padding: 22px;
}

.auth-card {
  display: grid;
  gap: 18px;
  align-self: center;
}

.segmented {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  padding: 6px;
  border-radius: 16px;
  background: #f3fbff;
  border: 1px solid var(--line);
}

.segmented button {
  padding: 10px 14px;
  border-radius: 12px;
  background: transparent;
  color: var(--muted);
  font-weight: 700;
}

.segmented button.active {
  background: #fff;
  color: var(--text);
  box-shadow: 0 8px 18px rgba(22, 50, 70, 0.07);
}

.field-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}

.field-grid.three {
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

.field {
  display: grid;
  gap: 7px;
}

.field.full {
  grid-column: 1 / -1;
}

label {
  font-size: 13px;
  font-weight: 700;
}

input,
select,
textarea {
  width: 100%;
  padding: 12px 13px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: #fff;
  color: var(--text);
  outline: none;
}

input:focus,
select:focus,
textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(31, 134, 199, 0.12);
}

textarea {
  min-height: 96px;
  resize: vertical;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 16px;
  border-radius: 16px;
  font-weight: 700;
  transition: 0.18s transform, 0.18s opacity, 0.18s background;
}

.btn:hover {
  transform: translateY(-1px);
}

.btn-primary {
  background: linear-gradient(135deg, var(--primary), var(--primary-2));
  color: #fff;
  box-shadow: 0 12px 28px rgba(31, 134, 199, 0.22);
}

.btn-secondary {
  background: #fff;
  border: 1px solid var(--line);
  color: var(--text);
}

.btn-ghost {
  background: rgba(255, 255, 255, 0.72);
  border: 1px dashed var(--line-strong);
  color: var(--muted);
}

.btn-danger {
  background: #fff2f5;
  border: 1px solid #f0d0d9;
  color: #af3b57;
}

.btn-sm {
  padding: 8px 11px;
  border-radius: 12px;
  font-size: 12px;
}

.row {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.stack {
  display: grid;
  gap: 12px;
}

.tiny {
  font-size: 12px;
  color: var(--muted);
  line-height: 1.6;
}

.muted {
  color: var(--muted);
}

.status {
  font-size: 13px;
  color: var(--muted);
}

.status.success {
  color: var(--success);
}

.status.error {
  color: var(--danger);
}

.status.warning {
  color: var(--warning);
}

.auth-help,
.section-note {
  padding: 16px;
  border-radius: 18px;
  background: var(--surface-soft);
  border: 1px solid var(--line);
}

.main-shell {
  display: grid;
  grid-template-columns: var(--sidebar) 1fr;
  min-height: 100vh;
}

.sidebar {
  margin: 18px 0 18px 18px;
  display: grid;
  grid-template-rows: auto auto 1fr auto;
  gap: 18px;
  position: sticky;
  top: 18px;
  height: calc(100vh - 36px);
}

.sidebar-meta {
  display: grid;
  gap: 12px;
}

.pill {
  background: #eef8ff;
  color: #2a6f99;
  border: 1px solid #d4e7f5;
}

.pill.admin {
  background: #eefbf5;
  color: #1f7a5c;
  border-color: #d4eedf;
}

.pill.locked {
  background: #fff6e8;
  color: #8b671d;
  border-color: #efdcae;
}

.nav {
  display: grid;
  gap: 8px;
}

.nav button {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 13px 14px;
  border-radius: 16px;
  background: transparent;
  color: var(--muted);
  font-weight: 700;
  text-align: left;
}

.nav button.active {
  background: linear-gradient(135deg, rgba(31, 134, 199, 0.12), rgba(56, 182, 166, 0.13));
  color: var(--text);
  border: 1px solid var(--line);
}

.content {
  padding: 18px 18px 24px;
  min-width: 0;
}

.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 14px;
}

.topbar-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  align-items: center;
}

.page {
  display: grid;
  gap: 18px;
  margin-top: 18px;
}

.page-header {
  padding: 26px;
  border-radius: var(--radius);
  border: 1px solid var(--line);
  background: linear-gradient(135deg, rgba(31, 134, 199, 0.1), rgba(56, 182, 166, 0.12), rgba(255, 255, 255, 0.8));
  position: relative;
  overflow: hidden;
}

.page-header::after {
  content: "";
  position: absolute;
  width: 280px;
  height: 280px;
  right: -60px;
  bottom: -140px;
  background: radial-gradient(circle, rgba(56, 182, 166, 0.16), transparent 62%);
}

.page-header h2 {
  font-size: clamp(1.5rem, 3vw, 2.4rem);
}

.page-header p {
  margin-top: 10px;
  color: var(--muted);
  max-width: 860px;
  line-height: 1.68;
}

.header-actions {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 18px;
}

.metrics {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 14px;
}

.grid-2 {
  display: grid;
  grid-template-columns: 1.15fr 0.85fr;
  gap: 18px;
}

.grid-3 {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 18px;
}

.card-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.card-head p {
  margin-top: 6px;
  color: var(--muted);
  line-height: 1.6;
}

.list {
  margin: 0;
  padding-left: 18px;
  color: var(--muted);
  line-height: 1.7;
}

.toolbar {
  display: grid;
  grid-template-columns: 1.1fr repeat(4, minmax(140px, 0.55fr)) auto auto;
  gap: 10px;
  align-items: center;
}

.table-wrap,
.sheet-preview {
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: #fff;
}

.desktop-only {
  display: block;
}

.mobile-only {
  display: none;
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1400px;
}

th,
td {
  padding: 12px;
  border-bottom: 1px solid #edf3f7;
  text-align: left;
  font-size: 13px;
  vertical-align: top;
}

th {
  position: sticky;
  top: 0;
  background: #f8fcff;
  color: var(--muted);
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

tr:hover td {
  background: #fbfeff;
}

.tag {
  background: #f3fbff;
  border: 1px solid var(--line);
  color: var(--muted);
}

.outcome-pill {
  padding: 6px 10px;
}

.outcome-pill.admitted,
.outcome-pill.ongoing {
  background: #fff6e8;
  color: #8b671d;
}

.outcome-pill.discharged {
  background: #e9f8f1;
  color: #1f7a5c;
}

.outcome-pill.death {
  background: #fff0f4;
  color: #ab3d58;
}

.outcome-pill.lama {
  background: #f8f3ff;
  color: #6951a7;
}

.outcome-pill.transfer-out,
.outcome-pill.referral {
  background: #edf6ff;
  color: #295f93;
}

.empty {
  padding: 26px;
  border-radius: 18px;
  border: 1px dashed var(--line-strong);
  background: var(--surface-soft);
  text-align: center;
  color: var(--muted);
}

.summary-table table {
  min-width: 1800px;
}

.summary-table th:first-child,
.summary-table td:first-child {
  position: sticky;
  left: 0;
  background: #fff;
  z-index: 1;
}

.summary-table th:first-child {
  background: #f8fcff;
  z-index: 2;
}

.sheet-preview table {
  min-width: 1600px;
}

.record-card-list {
  display: grid;
  gap: 12px;
}

.record-card {
  padding: 16px;
  border-radius: 18px;
  border: 1px solid var(--line);
  background: #fff;
}

.record-card-head {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  align-items: flex-start;
}

.record-card-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-top: 12px;
}

.record-card-grid .tiny strong {
  display: block;
  color: var(--text);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 3px;
}

.loading {
  opacity: 0.65;
  pointer-events: none;
}

.footer-note {
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  padding: 8px 0 0;
}

@media (max-width: 1320px) {
  .metrics {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  .grid-2,
  .grid-3 {
    grid-template-columns: 1fr;
  }

  .toolbar {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 1100px) {
  .auth-shell,
  .main-shell {
    grid-template-columns: 1fr;
  }

  .sidebar {
    position: relative;
    top: auto;
    height: auto;
    margin: 18px;
  }

  .hero-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .content {
    padding-top: 0;
  }
}

@media (max-width: 760px) {
  .auth-shell {
    padding: 16px;
  }

  .auth-hero,
  .auth-card,
  .page-header,
  .card,
  .table-card,
  .sheet-card,
  .metric,
  .topbar {
    border-radius: 20px;
  }

  .auth-title {
    font-size: 2rem;
  }

  .page-header {
    padding: 20px;
  }

  .field-grid,
  .field-grid.three,
  .hero-grid,
  .metrics,
  .toolbar {
    grid-template-columns: 1fr;
  }

  .topbar {
    flex-direction: column;
    align-items: flex-start;
  }

  .topbar-actions {
    width: 100%;
  }

  .topbar-actions .btn,
  .topbar-actions .tag {
    width: 100%;
    justify-content: center;
  }

  .content,
  .sidebar {
    margin: 0;
    padding: 16px;
  }

  .sidebar {
    border-radius: 0;
  }

  .desktop-only {
    display: none;
  }

  .mobile-only {
    display: block;
  }

  .record-card-grid {
    grid-template-columns: 1fr;
  }
}

</style>
</head>

    setStatus("Back online. Syncing latest records...", "success");
  });

  window.addEventListener("offline", function () {
    setStatus("You are offline. Showing cached data; sync resumes automatically.", "warning");
  });

  function getSavedRoute() {
    const hash = location.hash.replace("#", "").trim();
    const stored = localStorage.getItem(KEYS.route) || "dashboard";
    return ROUTES.includes(hash) ? hash : ROUTES.includes(stored) ? stored : "dashboard";
  }

  function saveRoute(route) {
    state.route = ROUTES.includes(route) ? route : "dashboard";
    localStorage.setItem(KEYS.route, state.route);
    location.hash = state.route;
  }

  function saveDraft(record) {
    state.draft = normalizeRecord(record);
    localStorage.setItem(KEYS.draft, JSON.stringify(state.draft));
  }

  function loadDraft() {
    try {
      const raw = localStorage.getItem(KEYS.draft);
      return raw ? JSON.parse(raw) : {};
    } catch (error) {
      return {};
    }
  }

  function clearDraft() {
    state.draft = normalizeRecord({});
    localStorage.removeItem(KEYS.draft);
  }

  function normalizeRecord(record) {
    const next = Object.assign({}, baseRecord, record || {});
    next.unit = UNITS.includes(next.unit) ? next.unit : "NICU";
    next.admission_source = SOURCES.includes(next.admission_source) ? next.admission_source : "Direct Admission";
    next.birth_origin = BIRTH_ORIGINS.includes(next.birth_origin) ? next.birth_origin : "Inborn";
    next.outcome = OUTCOMES.includes(next.outcome) ? next.outcome : "Admitted";
    next.gestational_age = toNumericOrEmpty(next.gestational_age);
    next.birth_weight = toNumericOrEmpty(next.birth_weight);
    next.apgar_1 = toNumericOrEmpty(next.apgar_1);
    next.apgar_5 = toNumericOrEmpty(next.apgar_5);
    next.mother_age = toNumericOrEmpty(next.mother_age);

    if (next.outcome !== "Death") {
      next.death_timing_bucket = "";
      next.death_timing_detail = "";
      next.death_cause_detail = "";
    }

    if (!CLOSED_OUTCOMES.includes(next.outcome)) {
      next.discharge_date = "";
    }

    return next;
  }

  function toNumericOrEmpty(value) {
    if (value === "" || value == null) {
      return "";
    }
    const number = Number(value);
    return Number.isFinite(number) ? number : "";
  }

  function currentEmail() {
    return String(state.currentUser && state.currentUser.email || "").trim().toLowerCase();
  }

  function isAdmin() {
    return !!(state.profile && state.profile.role === "admin");
  }

  function setStatus(message, type, scope) {
    if (scope === "auth") {
      state.authStatus = message || "";
      state.authStatusType = type || "";
    } else {
      state.globalStatus = message || "";
      state.globalStatusType = type || "";
    }
    render();
  }

  function clearGlobalStatus() {
    state.globalStatus = "";
    state.globalStatusType = "";
  }

  function friendlyFirestoreError(error, fallback) {
    const code = String(error && error.code || "");
    const msg = String(error && error.message || "");
    if (!navigator.onLine || code.indexOf("unavailable") !== -1 || /client is offline/i.test(msg)) {
      return "You are offline. Showing cached data; syncing resumes when internet returns.";
    }
    return fallback || msg || "Unexpected error.";
  }

  function escapeHtml(value) {
    return String(value == null ? "" : value).replace(/[&<>"']/g, function (char) {
      return {
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char];
    });
  }

  function safeAttr(value) {
    return escapeHtml(value).replace(/"/g, "&quot;");
  }

  function uid(prefix) {
    return (prefix || "rec") + "-" + Math.random().toString(36).slice(2, 8) + Date.now().toString(36).slice(-5);
  }

  function autoPatientId() {
    const now = new Date();
    return "NICU-" + now.getFullYear() + "-" + String(now.getMonth() + 1).padStart(2, "0") + String(Math.floor(Math.random() * 9000) + 1000);
  }

  function fmtDate(value) {
    if (!value) {
      return "â€”";
    }
    const date = new Date(value);
    return Number.isNaN(date.getTime()) ? value : date.toLocaleDateString();
  }

  function fmtInt(value) {
    return Number(value || 0).toLocaleString();
  }

  function monthLabel(dateString) {
    if (!dateString) {
      return "";
    }
    const date = new Date(dateString);
    if (Number.isNaN(date.getTime())) {
      return "";
    }
    return date.toLocaleString("en-US", { month: "long" }).toUpperCase();
  }

  function outcomeClass(outcome) {
    return String(outcome || "Ongoing").toLowerCase().replace(/\s+/g, "-");
  }

  function optionMarkup(options, value, placeholder) {
    const first = placeholder ? "<option value=\"\">" + escapeHtml(placeholder) + "</option>" : "";
    return first + options.map(function (option) {
      return "<option value=\"" + safeAttr(option) + "\"" + (option === value ? " selected" : "") + ">" + escapeHtml(option) + "</option>";
    }).join("");
  }

  function currentRecord() {
    if (state.editingId) {
      const existing = state.records.find(function (item) {
        return item.id === state.editingId;
      });
      if (existing) {
        return normalizeRecord(existing);
      }
    }
    return normalizeRecord(state.draft);
  }

  function filteredRecords() {
    return state.records
      .filter(function (record) {
        const q = state.filters.q.trim().toLowerCase();
        const blob = [
          record.patient_id,
          record.baby_name,
          record.mother_name,
          record.contact_number,
          record.diagnosis_group,
          record.diagnosis_detail
        ].join(" ").toLowerCase();

        if (q && !blob.includes(q)) {
          return false;
        }
        if (state.filters.unit && record.unit !== state.filters.unit) {
          return false;
        }
        if (state.filters.outcome && record.outcome !== state.filters.outcome) {
          return false;
        }
        if (state.filters.diagnosis_group && record.diagnosis_group !== state.filters.diagnosis_group) {
          return false;
        }
        if (state.filters.death_timing_bucket && record.death_timing_bucket !== state.filters.death_timing_bucket) {
          return false;
        }
        return true;
      })
      .slice()
      .sort(function (a, b) {
        return String(b.admission_date || "").localeCompare(String(a.admission_date || ""));
      });
  }

  function reportRecords() {
    return state.records.filter(function (record) {
      const fromOk = !state.report.from || String(record.admission_date || "") >= state.report.from;
      const toOk = !state.report.to || String(record.admission_date || "") <= state.report.to;
      return fromOk && toOk;
    });
  }

  function dashboardStats(records) {
    return {
      admissions: records.length,
      deaths: records.filter(function (item) { return item.outcome === "Death"; }).length,
      discharges: records.filter(function (item) { return item.outcome === "Discharged"; }).length,
      lama: records.filter(function (item) { return item.outcome === "LAMA"; }).length,
      transfers: records.filter(function (item) { return item.outcome === "Transfer Out" || item.outcome === "Referral"; }).length,
      ongoing: records.filter(function (item) { return item.outcome === "Admitted" || item.outcome === "Ongoing"; }).length
    };
  }

  function monthlySummary(records) {
    const months = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
    const summary = {};

    months.forEach(function (month) {
      summary[month] = {
        Month: month,
        "Direct Admission": 0,
        "Transfer in": 0,
        "Total No of Admission (NICU1+SNCU2)": 0,
        "Total No of Death (inborn+ out born)": 0,
        "Discharge": 0,
        "LAMA": 0,
        "Transfer out/ referral": 0,
        "Pre Term": 0,
        "Severe Birth Asphyxia": 0,
        "SEPSIS": 0,
        "Respiratory Distress Syndrome (RDS)": 0,
        "Others": 0
      };
    });

    records.forEach(function (record) {
      const month = monthLabel(record.admission_date);
      if (!month || !summary[month]) {
        return;
      }
      const bucket = summary[month];
      bucket["Total No of Admission (NICU1+SNCU2)"] += 1;
      if (record.admission_source === "Transfer in") {
        bucket["Transfer in"] += 1;
      } else {
        bucket["Direct Admission"] += 1;
      }
      if (record.outcome === "Death") {
        bucket["Total No of Death (inborn+ out born)"] += 1;
      }
      if (record.outcome === "Discharged") {
        bucket["Discharge"] += 1;
      }
      if (record.outcome === "LAMA") {
        bucket["LAMA"] += 1;
      }
      if (record.outcome === "Transfer Out" || record.outcome === "Referral") {
        bucket["Transfer out/ referral"] += 1;
      }
      if (DIAGNOSIS_GROUPS.includes(record.diagnosis_group)) {
        bucket[record.diagnosis_group] += 1;
      }
    });

    return months.map(function (month) {
      return summary[month];
    });
  }

  function totalRow(summaryRows) {
    const total = { Month: "TOTAL" };
    Object.keys(summaryRows[0] || {}).forEach(function (key) {
      if (key !== "Month") {
        total[key] = summaryRows.reduce(function (sum, row) {
          return sum + Number(row[key] || 0);
        }, 0);
      }
    });
    return total;
  }

  function percentageRow(summaryRows) {
    const totals = totalRow(summaryRows);
    const admissions = Number(totals["Total No of Admission (NICU1+SNCU2)"] || 0);
    const row = { Month: "PERCENTAGE" };
    Object.keys(totals).forEach(function (key) {
      if (key === "Month") {
        return;
      }
      if (!admissions || key === "Total No of Admission (NICU1+SNCU2)") {
        row[key] = key === "Total No of Admission (NICU1+SNCU2)" ? 100 : 0;
        return;
      }
      row[key] = Number(((Number(totals[key] || 0) / admissions) * 100).toFixed(2));
    });
    return row;
  }

  let renderQueued = false;
  function render() {
    if (renderQueued) {
      return;
    }
    renderQueued = true;
    requestAnimationFrame(function () {
      renderQueued = false;
      performRender();
    });
  }
  function bindEvents() {
    appRoot.querySelectorAll("[data-route]").forEach(function (button) {
      button.addEventListener("click", function () {
        clearGlobalStatus();
        const route = button.getAttribute("data-route");
        if (route === "settings" && !isAdmin()) {
          setStatus("Only admin users can open Settings.", "warning");
          return;
        }
        saveRoute(route);
        render();
      });
    });

    appRoot.querySelectorAll("[data-auth-view]").forEach(function (button) {

        state.authStatus = "";
        state.authStatusType = "";
        render();
      });
    });

    const authForm = document.getElementById("authForm");
    if (authForm) {
      authForm.addEventListener("submit", async function (event) {

        render();

          } else if (state.authView === "signup") {
            await auth.createUserWithEmailAndPassword(email, password);
            setStatus("Account created successfully.", "success", "auth");
          } else {
            await auth.sendPasswordResetEmail(email);
            setStatus("Password reset email sent.", "success", "auth");
          }
        } catch (error) {
          setStatus(error.message || "Authentication failed.", "error", "auth");
        }
        state.loading = false;
        render();
      });
    }

    const googleSignIn = document.getElementById("googleSignIn");
    if (googleSignIn) {
      googleSignIn.addEventListener("click", async function () {
        state.loading = true;
        render();
        try {
          await auth.signInWithPopup(provider);
          setStatus("Google sign-in successful.", "success", "auth");
        } catch (error) {
          setStatus(error.message || "Google sign-in failed.", "error", "auth");
        }
        state.loading = false;
        render();
      });
    }

    const signOutBtn = document.getElementById("signOutBtn");

        clearSubscriptions();

  function bindDraftPersistence(form) {
    form.querySelectorAll("input, select, textarea").forEach(function (element) {
      const eventName = element.tagName === "SELECT" ? "change" : "input";
      element.addEventListener(eventName, function () {
        saveDraft(formToRecord(form));
      });
    });
  }

  function bindFilter(id, key, eventName) {
    const element = document.getElementById(id);
    if (!element) {
      return;
    }
    element.addEventListener(eventName, function (event) {
      state.filters[key] = event.target.value;
      render();
    });
  }

  function formToRecord(form) {
    const formData = new FormData(form);
    const raw = Object.fromEntries(formData.entries());
    const existing = state.editingId ? state.records.find(function (item) { return item.id === state.editingId; }) : null;
    return {
      id: state.editingId || uid("rec"),
      patient_id: String(raw.patient_id || "").trim() || (existing && existing.patient_id) || autoPatientId(),
      baby_name: String(raw.baby_name || "").trim(),
      sex: String(raw.sex || "").trim(),
      dob: String(raw.dob || "").trim(),
      admission_date: String(raw.admission_date || "").trim(),
      discharge_date: String(raw.discharge_date || "").trim(),
      unit: String(raw.unit || "").trim() || "NICU",
      bed_number: String(raw.bed_number || "").trim(),
      admission_source: String(raw.admission_source || "").trim() || "Direct Admission",
      birth_origin: String(raw.birth_origin || "").trim() || "Inborn",
      diagnosis_group: String(raw.diagnosis_group || "").trim(),
      diagnosis_detail: String(raw.diagnosis_detail || "").trim(),
      gestational_age: toNumericOrEmpty(raw.gestational_age),
      birth_weight: toNumericOrEmpty(raw.birth_weight),
      apgar_1: toNumericOrEmpty(raw.apgar_1),
      apgar_5: toNumericOrEmpty(raw.apgar_5),
      respiratory_support: String(raw.respiratory_support || "").trim(),
      sepsis_status: String(raw.sepsis_status || "").trim(),
      feeding_type: String(raw.feeding_type || "").trim(),
      mother_name: String(raw.mother_name || "").trim(),
      mother_age: toNumericOrEmpty(raw.mother_age),
      father_name: String(raw.father_name || "").trim(),
      contact_number: String(raw.contact_number || "").trim(),
      address: String(raw.address || "").trim(),
      delivery_type: String(raw.delivery_type || "").trim(),
      antenatal_steroids: String(raw.antenatal_steroids || "").trim(),
      outcome: String(raw.outcome || "").trim() || "Admitted",
      death_timing_bucket: String(raw.death_timing_bucket || "").trim(),
      death_timing_detail: String(raw.death_timing_detail || "").trim(),
      death_cause_detail: String(raw.death_cause_detail || "").trim(),
      notes: String(raw.notes || "").trim(),
      created_at: existing ? existing.created_at : new Date().toISOString(),
      created_by: existing ? existing.created_by : currentEmail(),
      updated_at: new Date().toISOString(),
      updated_by: currentEmail()
    };
  }

  function validateRecord(record) {
    if (!record.admission_date) {
      return "Admission date is required.";
    }
    if (record.gestational_age !== "" && (record.gestational_age < 20 || record.gestational_age > 45)) {
      return "Gestational age must be between 20 and 45 weeks when entered.";
    }
    if (record.birth_weight !== "" && (record.birth_weight < 300 || record.birth_weight > 7000)) {
      return "Birth weight must be between 300 and 7000 g when entered.";
    }
    if (record.apgar_1 !== "" && (record.apgar_1 < 0 || record.apgar_1 > 10)) {
      return "APGAR at 1 minute must be between 0 and 10.";
    }
    if (record.apgar_5 !== "" && (record.apgar_5 < 0 || record.apgar_5 > 10)) {
      return "APGAR at 5 minutes must be between 0 and 10.";
    }
    if (record.outcome === "Death" && !record.death_cause_detail) {
      return "Please choose the death cause detail for death outcomes.";
    }
    const duplicate = state.records.find(function (item) {
      return String(item.patient_id || "").toLowerCase() === String(record.patient_id || "").toLowerCase() && item.id !== record.id;
    });
    if (duplicate) {
      return "Patient ID already exists. Open the existing record for updates.";
    }
    return "";
  }

  function downloadFile(name, content, type) {
    const blob = new Blob([content], { type: type });
    const url = URL.createObjectURL(blob);
    const anchor = document.createElement("a");
    anchor.href = url;
    anchor.download = name;
    anchor.click();
    setTimeout(function () {
      URL.revokeObjectURL(url);
    }, 300);
  }

  function toCsv(rows) {
    const headers = [
      "patient_id", "baby_name", "admission_date", "discharge_date", "unit", "admission_source", "birth_origin", "sex", "dob", "mother_name", "mother_age", "contact_number", "address", "delivery_type", "antenatal_steroids", "gestational_age", "birth_weight", "apgar_1", "apgar_5", "respiratory_support", "sepsis_status", "feeding_type", "diagnosis_group", "diagnosis_detail", "outcome", "death_timing_bucket", "death_timing_detail", "death_cause_detail", "notes", "created_by", "updated_by", "created_at", "updated_at"
    ];
    return [headers.join(",")].concat(rows.map(function (row) {
      return headers.map(function (header) {
        return csvCell(row[header]);
      }).join(",");
    })).join("\n");
  }

  function csvCell(value) {
    const text = String(value == null ? "" : value).replace(/"/g, "\"\"");
    return /[",\n]/.test(text) ? "\"" + text + "\"" : text;
  }

  function exportWorkbook() {
    if (typeof XLSX === "undefined") {
      setStatus("Excel library did not load. Please refresh and try again.", "error");
      return;
    }
    const records = reportRecords();
    const summary = monthlySummary(records);
    const totals = totalRow(summary);
    const percentage = percentageRow(summary);
    const patientSheetRows = records.map(function (item) {
      return {
        "Patient ID": item.patient_id,
        "Baby Name": item.baby_name,
        "Admission Date": item.admission_date,
        "Outcome Date": item.discharge_date,
        "Unit": item.unit,
        "Admission Source": item.admission_source,
        "Birth Origin": item.birth_origin,
        "Sex": item.sex,
        "DOB": item.dob,
        "Gestational Age": item.gestational_age,
        "Birth Weight": item.birth_weight,
        "Diagnosis Group": item.diagnosis_group,
        "Diagnosis Detail": item.diagnosis_detail,
        "Outcome": item.outcome,
        "Death Timing Bucket": item.death_timing_bucket,
        "Death Timing Detail": item.death_timing_detail,
        "Death Cause Detail": item.death_cause_detail,
        "Mother Name": item.mother_name,
        "Contact Number": item.contact_number,
        "Notes": item.notes
      };
    });

    const referenceRows = DEATH_TIMING_DETAILS.map(function (item) {
      return { Type: "Death Timing Detail", Value: item };
    }).concat(DEATH_CAUSE_DETAILS.map(function (item) {
      return { Type: "Death Cause Detail", Value: item };
    }));

    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet(patientSheetRows.length ? patientSheetRows : [{ "Patient ID": "No records in selected range" }]), "Patient Records");
    XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet(summary.concat([totals, percentage])), "Monthly Summary");
    XLSX.utils.book_append_sheet(workbook, XLSX.utils.json_to_sheet(referenceRows), "Death Detail Reference");
    XLSX.writeFile(workbook, "nicu-monthly-summary.xlsx");
    setStatus("Excel workbook exported successfully.", "success");
  }

  async function ensureProfileAndSettings(user) {
    const settingsRef = db.collection("settings").doc("app");
    const profileRef = db.collection("users").doc(user.uid);
    const settingsSnap = await settingsRef.get();
    let settings = settingsSnap.exists ? Object.assign({}, baseSettings, settingsSnap.data()) : Object.assign({}, baseSettings);

    const hasAdmin = Array.isArray(settings.adminEmails) && settings.adminEmails.length > 0;
    if (!hasAdmin && user.email) {
      settings.adminEmails = [String(user.email).trim().toLowerCase()];
      await settingsRef.set(settings, { merge: true });
    } else if (!settingsSnap.exists) {
      await settingsRef.set(settings, { merge: true });
    }

    const email = String(user.email || "").trim().toLowerCase();
    const role = (settings.adminEmails || []).includes(email) ? "admin" : "staff";

    await profileRef.set({
      email: user.email || "",
      displayName: user.displayName || "",
      role: role,
      lastLoginAt: new Date().toISOString(),
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
  }

  function clearSubscriptions() {
    state.unsubscribers.forEach(function (unsubscribe) {
      try {
        unsubscribe();
      } catch (error) {
      }
    });
    state.unsubscribers = [];
  }

  function subscribeToCloud() {
    if (!state.currentUser) {
      return;
    }
    clearSubscriptions();

    const settingsUnsub = db.collection("settings").doc("app").onSnapshot(function (snapshot) {
      state.settings = snapshot.exists ? Object.assign({}, baseSettings, snapshot.data()) : Object.assign({}, baseSettings);
      const email = currentEmail();
      const role = (state.settings.adminEmails || []).includes(email) ? "admin" : "staff";
      state.profile = Object.assign({}, state.profile || {}, { role: role });
      render();
    }, function (error) {
      setStatus(friendlyFirestoreError(error, "Could not subscribe to settings."), "error");
    });

    const profileUnsub = db.collection("users").doc(state.currentUser.uid).onSnapshot(function (snapshot) {
      if (snapshot.exists) {
        state.profile = snapshot.data();
        if ((state.settings.adminEmails || []).includes(currentEmail())) {
          state.profile.role = "admin";
        }
      }
      render();
    }, function (error) {
      setStatus(friendlyFirestoreError(error, "Could not subscribe to profile."), "error");
    });

    const recordsUnsub = db.collection("records").onSnapshot(function (snapshot) {
      state.records = snapshot.docs.map(function (doc) {
        return normalizeRecord(Object.assign({ id: doc.id }, doc.data()));
      }).sort(function (a, b) {
        return String(b.admission_date || "").localeCompare(String(a.admission_date || ""));
      });
      render();
    }, function (error) {
      setStatus(friendlyFirestoreError(error, "Could not subscribe to records."), "error");
    });

    state.unsubscribers = [settingsUnsub, profileUnsub, recordsUnsub];
  }

  const AUTH_BOOT_TIMEOUT_MS = 5000;
  const bootTimer = setTimeout(function () {
    if (!state.bootResolved) {
      state.booting = false;
      state.authStatus = "Taking longer than expected to connect. You can still sign in.";
      state.authStatusType = "warning";
      render();
    }
  }, AUTH_BOOT_TIMEOUT_MS);

  auth.onAuthStateChanged(function (user) {
    state.bootResolved = true;
    clearTimeout(bootTimer);
    state.booting = false;
    state.currentUser = user || null;
    state.authStatus = "";
    state.authStatusType = "";
    clearGlobalStatus();

    if (!user) {
      clearSubscriptions();
      state.profile = null;
      state.records = [];
      state.settings = Object.assign({}, baseSettings);
      render();
      return;
    }

    // Fast path: render + subscribe immediately for returning signed-in users.
    subscribeToCloud();
    if (state.route === "settings" && !isAdmin()) {
      saveRoute("dashboard");
    }
    render();

    // Background consistency sync (do not block first paint).
    ensureProfileAndSettings(user).catch(function (error) {
      setStatus(friendlyFirestoreError(error, "Could not initialize Firebase data."), "error");
    });
  });

  window.addEventListener("hashchange", function () {
    const hash = location.hash.replace("#", "");
    if (ROUTES.includes(hash)) {
      state.route = hash;
      render();
    }
  });

  render();
})();

</script>
</body>
</html>
