<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="RIMS NICU Tracker with Supabase auth, live neonatal records, analytics, reports, and demo mode." />
  <title>RIMS NICU Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#eff7fb;
      --bg-2:#e8f2f8;
      --surface:rgba(255,255,255,.9);
      --surface-strong:#ffffff;
      --surface-soft:#f6fbfe;
      --line:#d9e7ef;
      --line-strong:#bfd7e5;
      --text:#163246;
      --muted:#647f92;
      --primary:#2d91cb;
      --primary-2:#52c3bf;
      --accent:#7eb7ff;
      --success:#24896d;
      --warning:#c78322;
      --danger:#cf4f69;
      --shadow:0 18px 48px rgba(30,96,132,.12);
      --radius:24px;
      --radius-sm:16px;
      --sidebar:280px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;min-height:100%;font-family:'Inter',system-ui,sans-serif;color:var(--text);background:linear-gradient(180deg,var(--bg),var(--bg-2));}
    body{overflow-x:hidden}
    a{color:inherit}
    button,input,select,textarea{font:inherit}
    button{cursor:pointer;border:none}
    .hidden{display:none!important}
    .app-shell{min-height:100vh}
    .auth-shell{min-height:100vh;display:grid;grid-template-columns:1.1fr .9fr;gap:24px;padding:28px;max-width:1440px;margin:0 auto;align-items:stretch}
    .glass,.panel,.card,.metric,.chart-card,.table-card,.sidebar,.topbar,.auth-card,.report-preview{background:var(--surface);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.72);box-shadow:var(--shadow)}
    .hero-panel,.auth-card,.card,.sidebar,.topbar,.chart-card,.table-card,.report-preview{border-radius:var(--radius)}
    .brand{display:flex;align-items:center;gap:14px}
    .logo-mark{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,var(--primary),var(--primary-2));position:relative;box-shadow:0 12px 26px rgba(45,145,203,.22);flex:none}
    .logo-mark:before,.logo-mark:after{content:'';position:absolute;background:#fff;border-radius:999px;opacity:.95}
    .logo-mark:before{width:10px;height:30px;left:18px;top:8px}
    .logo-mark:after{width:30px;height:10px;left:8px;top:18px}
    .brand-copy strong{display:block;font-size:1rem}
    .brand-copy span{display:block;color:var(--muted);font-size:.9rem}
    .auth-hero{padding:30px;border-radius:32px;background:linear-gradient(150deg,rgba(45,145,203,.12),rgba(82,195,191,.12),rgba(126,183,255,.08)),var(--surface-strong);position:relative;overflow:hidden}
    .auth-hero:before,.auth-hero:after{content:'';position:absolute;border-radius:50%;pointer-events:none}
    .auth-hero:before{width:320px;height:320px;right:-90px;top:-60px;background:radial-gradient(circle,rgba(82,195,191,.20),transparent 68%)}
    .auth-hero:after{width:260px;height:260px;left:-70px;bottom:-80px;background:radial-gradient(circle,rgba(126,183,255,.16),transparent 66%)}
    .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--muted);font-weight:700;font-size:12px;letter-spacing:.06em;text-transform:uppercase}
    h1,h2,h3,h4,p{margin:0}
    .auth-title{margin-top:18px;font-size:clamp(2.2rem,4vw,3.6rem);line-height:1.03;max-width:700px}
    .auth-subtitle{margin-top:14px;color:var(--muted);line-height:1.7;max-width:720px}
    .hero-stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-top:26px}
    .hero-stat{padding:16px;border-radius:20px;background:rgba(255,255,255,.84);border:1px solid var(--line)}
    .hero-stat .k{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700}
    .hero-stat .v{font-size:1.6rem;font-weight:800;margin-top:8px}
    .hero-stat .s{font-size:12px;color:var(--muted);margin-top:4px}
    .auth-card{padding:24px;display:grid;gap:18px;align-self:center}
    .segmented{display:flex;gap:8px;flex-wrap:wrap;background:#f4fbff;padding:6px;border-radius:16px;border:1px solid var(--line)}
    .segmented button{padding:10px 14px;border-radius:12px;background:transparent;font-weight:700;color:var(--muted)}
    .segmented button.active{background:#fff;color:var(--text);box-shadow:0 6px 18px rgba(22,50,70,.07)}
    .field-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
    .field{display:grid;gap:7px}
    .field.full{grid-column:1/-1}
    label{font-size:13px;font-weight:700}
    input,select,textarea{width:100%;padding:12px 13px;border-radius:14px;border:1px solid var(--line);background:#fff;color:var(--text);outline:none}
    input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 4px rgba(45,145,203,.12)}
    textarea{min-height:96px;resize:vertical}
    .btn{padding:12px 16px;border-radius:16px;font-weight:700;transition:.18s transform,.18s opacity,.18s background}
    .btn:hover{transform:translateY(-1px)}
    .btn-primary{color:#fff;background:linear-gradient(135deg,var(--primary),var(--primary-2));box-shadow:0 12px 26px rgba(45,145,203,.22)}
    .btn-secondary{background:#fff;border:1px solid var(--line);color:var(--text)}
    .btn-danger{background:#fff1f4;border:1px solid #f3d0d8;color:#b13e58}
    .btn-ghost{background:rgba(255,255,255,.65);border:1px dashed var(--line-strong);color:var(--muted)}
    .btn-sm{padding:8px 11px;border-radius:12px;font-weight:700;font-size:12px}
    .stack{display:grid;gap:12px}
    .status{font-size:13px;color:var(--muted)}
    .status.error{color:var(--danger)}
    .status.success{color:var(--success)}
    .muted{color:var(--muted)}
    .tiny{font-size:12px;color:var(--muted);line-height:1.6}
    .auth-help{padding:16px;border-radius:18px;background:var(--surface-soft);border:1px solid var(--line)}
    .main-shell{display:grid;grid-template-columns:var(--sidebar) 1fr;min-height:100vh}
    .sidebar{margin:18px 0 18px 18px;padding:20px;display:grid;grid-template-rows:auto auto 1fr auto;gap:18px;position:sticky;top:18px;height:calc(100vh - 36px)}
    .sidebar-meta{display:grid;gap:12px}
    .mode-pill,.info-pill,.kpi-chip,.tag,.outcome-pill{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;font-weight:700;font-size:12px}
    .mode-pill{background:#eef8ff;color:#246991;border:1px solid #d7eaf6}
    .mode-pill.demo{background:#fff6e7;color:#8d651f;border-color:#f1dfbb}
    .nav{display:grid;gap:8px}
    .nav button{display:flex;align-items:center;gap:12px;padding:13px 14px;border-radius:16px;background:transparent;color:var(--muted);font-weight:700;text-align:left}
    .nav button.active{background:linear-gradient(135deg,rgba(45,145,203,.12),rgba(82,195,191,.12));color:var(--text);border:1px solid var(--line)}
    .content{padding:18px 18px 24px 18px;min-width:0}
    .topbar{padding:16px 18px;display:flex;justify-content:space-between;gap:14px;align-items:center}
    .topbar-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .page{display:grid;gap:18px;margin-top:18px}
    .page-header{padding:26px;background:linear-gradient(135deg,rgba(45,145,203,.1),rgba(82,195,191,.12),rgba(255,255,255,.8));border-radius:var(--radius);border:1px solid var(--line);position:relative;overflow:hidden}
    .page-header:after{content:'';position:absolute;width:280px;height:280px;right:-60px;bottom:-140px;background:radial-gradient(circle,rgba(82,195,191,.16),transparent 62%)}
    .page-header h2{font-size:clamp(1.5rem,3vw,2.4rem)}
    .page-header p{margin-top:10px;color:var(--muted);max-width:820px;line-height:1.65}
    .header-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
    .metrics{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:14px}
    .metric{padding:18px;border-radius:22px}
    .metric .k{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);font-weight:700}
    .metric .v{margin-top:8px;font-size:1.9rem;font-weight:800}
    .metric .s{margin-top:6px;color:var(--muted);font-size:12px}
    .grid-2{display:grid;grid-template-columns:1.1fr .9fr;gap:18px}
    .grid-3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}
    .card{padding:22px}
    .card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:16px;flex-wrap:wrap}
    .card-head p{color:var(--muted);margin-top:6px;line-height:1.6}
    .quick-actions{display:flex;gap:10px;flex-wrap:wrap}
    .insights{display:grid;gap:10px;padding:0;margin:0;list-style:none}
    .insights li{padding:13px 14px;border-radius:14px;background:#fff;border:1px solid var(--line);line-height:1.55}
    .chart-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}
    .chart-card{padding:18px;border-radius:22px}
    .chart-wrap{position:relative;height:250px}
    canvas{width:100%;height:100%;display:block}
    .table-card{padding:22px;border-radius:24px}
    .toolbar{display:grid;grid-template-columns:1.2fr repeat(3,minmax(140px,.5fr)) auto auto;gap:10px;align-items:center;margin-bottom:14px}
    .table-wrap{overflow:auto;border:1px solid var(--line);border-radius:18px;background:#fff}
    .offline-note{padding:10px 12px;border-radius:12px;border:1px solid #f1dfbb;background:#fff6e7;color:#8d651f;font-size:13px}
    .password-wrap{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}
    .password-toggle{padding:10px 12px;border-radius:12px;border:1px solid var(--line);background:#fff;color:var(--muted);font-weight:700}
    .inline-help{font-size:12px;color:var(--muted);margin-top:4px}
    table{width:100%;border-collapse:collapse;min-width:980px}
    th,td{padding:12px;border-bottom:1px solid #edf3f7;text-align:left;font-size:13px;vertical-align:top}
    th{background:#f8fcff;color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;position:sticky;top:0}
    tr:hover td{background:#fbfeff}
    .sort{font-size:11px;color:var(--primary);margin-left:5px}
    .outcome-pill{padding:6px 10px}
    .outcome-pill.discharged{background:#eaf8f1;color:#247557}
    .outcome-pill.referred{background:#edf7ff;color:#246991}
    .outcome-pill.deceased{background:#fff0f3;color:#a63f57}
    .outcome-pill.ongoing{background:#fff6e7;color:#8f671d}
    .tag{background:#f3fbff;border:1px solid var(--line);color:var(--muted)}
    .empty{padding:26px;border-radius:18px;border:1px dashed var(--line-strong);background:var(--surface-soft);text-align:center;color:var(--muted)}
    .chips{display:flex;gap:10px;flex-wrap:wrap}
    .kpi-chip{background:#f3fbff;border:1px solid var(--line);color:var(--muted)}
    .reports-grid{display:grid;grid-template-columns:320px 1fr;gap:18px}
    .report-list{display:grid;gap:10px}
    .report-item{padding:14px;border-radius:16px;border:1px solid var(--line);background:#fff;cursor:pointer}
    .report-item.active{background:linear-gradient(135deg,rgba(45,145,203,.12),rgba(82,195,191,.12));border-color:#cfe5f1}
    .report-preview{padding:24px;border-radius:24px;background:#fff}
    .report-brand{display:flex;justify-content:space-between;gap:20px;align-items:flex-start;padding-bottom:14px;border-bottom:2px solid #dbe8ef}
    .report-title{margin-top:18px;font-size:1.45rem;font-weight:800}
    .report-meta{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin:18px 0}
    .report-box{padding:14px;border-radius:16px;background:#f8fcff;border:1px solid var(--line)}
    .report-table{width:100%;min-width:0}
    .report-table th{position:static;background:#f5fafe}
    .setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .code{padding:14px;border-radius:16px;background:#0f2230;color:#dff4ff;font-size:12px;line-height:1.6;overflow:auto}
    .list{margin:0;padding-left:18px;color:var(--muted);line-height:1.7}
    .about-grid{display:grid;grid-template-columns:1fr .9fr;gap:18px}
    .footer-note{text-align:center;color:var(--muted);font-size:13px;padding:8px 0 0}
    .overlay{position:fixed;inset:0;background:rgba(10,20,30,.45);display:flex;align-items:center;justify-content:center;padding:18px;z-index:40}
    .modal{width:min(860px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:24px;padding:22px;box-shadow:0 24px 70px rgba(0,0,0,.18)}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .split{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}
    .right{text-align:right}
    .loading{opacity:.65;pointer-events:none}
    .dot{width:8px;height:8px;border-radius:50%;background:currentColor;display:inline-block}
    @media (max-width:1320px){
      .metrics{grid-template-columns:repeat(3,minmax(0,1fr))}
      .grid-2,.reports-grid,.about-grid,.setup-grid{grid-template-columns:1fr}
    }
    @media (max-width:1100px){
      .auth-shell,.main-shell{grid-template-columns:1fr}
      .sidebar{position:relative;top:auto;height:auto;margin:18px}
      .content{padding-top:0}
      .hero-stats,.chart-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .toolbar{grid-template-columns:1fr 1fr}
    }
    @media (max-width:760px){
      .field-grid,.split,.hero-stats,.metrics,.chart-grid,.grid-3{grid-template-columns:1fr}
      .toolbar{grid-template-columns:1fr}
      .topbar,.brand,.topbar-actions{align-items:flex-start}
      .topbar{flex-direction:column}
      .auth-shell{padding:16px}
      .content,.sidebar{margin:0;padding:16px}
      .sidebar{border-radius:0}
      table{min-width:0}
      th:nth-child(7),td:nth-child(7),th:nth-child(8),td:nth-child(8){display:none}
      .header-actions .btn,.quick-actions .btn{width:100%}
    }
    @media print{
      body *{visibility:hidden}
      .print-target,.print-target *{visibility:visible}
      .print-target{position:absolute;left:0;top:0;width:100%;background:#fff;box-shadow:none;border:none}
    }
      .invalid-field{border-color:#d92d20 !important;box-shadow:0 0 0 3px rgba(217,45,32,.12) !important;background:#fff5f5}</style>

      function filteredRecords(){

          return (!q || text.includes(q)) && (!state.filters.outcome || r.outcome===state.filters.outcome) && (!state.filters.sex || r.sex===state.filters.sex) && (!state.filters.support || r.respiratory_support===state.filters.support);
        });
        list.sort((a,b)=>{
          let av = a[state.sort.key], bv = b[state.sort.key];
          if(['gestational_age','birth_weight','length_of_stay','apgar_1','apgar_5','mother_age'].includes(state.sort.key)){ av = num(av); bv = num(bv); }

      function analytics(data){

        const deceased = data.filter(r => r.outcome === 'Deceased').length;
        const avgWeight = avg(data.map(r => num(r.birth_weight)));
        const avgGa = avg(data.map(r => num(r.gestational_age)));
        const avgLos = avg(data.map(r => num(r.length_of_stay)));
        const lbw = data.filter(r => num(r.birth_weight) < 2500).length;
        const preterm = data.filter(r => num(r.gestational_age) < 37).length;
        return {total,active,discharged,deceased,avgWeight,avgGa,avgLos,lbw,preterm,dischargeRate:pct(discharged,total),mortality:pct(deceased,total)};
      }
      function countBy(data,key){ return data.reduce((acc,r)=>{ const k = r[key] || 'Unknown'; acc[k]=(acc[k]||0)+1; return acc; },{}); }
      function topEntry(obj){ const entries = Object.entries(obj); if(!entries.length) return ['None',0]; entries.sort((a,b)=>b[1]-a[1]); return entries[0]; }
      function weightBands(data){ const b={'<1000g':0,'1000-1499g':0,'1500-2499g':0,'2500-3999g':0,'â‰¥4000g':0}; data.forEach(r=>{ const w=num(r.birth_weight); if(w<1000)b['<1000g']++; else if(w<1500)b['1000-1499g']++; else if(w<2500)b['1500-2499g']++; else if(w<4000)b['2500-3999g']++; else b['â‰¥4000g']++; }); return b; }
      function monthlyTrend(data){ const map={}; data.forEach(r=>{ const d=new Date(r.admission_date); if(isNaN(d)) return; const k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); map[k]=(map[k]||0)+1; }); return Object.keys(map).sort().map(k=>({label:k,count:map[k]})); }
      function insights(data){
        if(!data.length) return ['No records yet. Seed demo data or create a new admission to populate the dashboard.'];
        const a = analytics(data);

        const suspected = data.filter(r => ['Suspected sepsis','Confirmed infection'].includes(r.sepsis_status)).length;
        const pretermPct = pct(a.preterm,a.total);
        const lbwPct = pct(a.lbw,a.total);

          'Average birth weight is ' + fmtInt(a.avgWeight) + ' g and average gestational age is ' + fmt1(a.avgGa) + ' weeks.',

        ];
      }

uided pages to configure the backend, capture admissions, and produce report exports.</p></div></div><div class="stack"><div class="empty">'+(isConfigured() ? 'Supabase is configured. New records can be saved to the cloud.' : 'Supabase is not configured yet. Demo mode remains fully usable while you complete setup in Settings.')+'</div><div class="quick-actions"><button class="btn btn-primary" data-route="new-record">New record</button><button class="btn btn-secondary" data-route="records">Review records</button><button class="btn btn-secondary" data-route="reports">Generate reports</button></div></div></section></div><section class="card"><div class="card-head"><div><h3>At-a-glance charts</h3><p>Compact visual summaries of the current admissions dataset.</p></div></div><div class="chart-grid"><div class="chart-card"><div class="card-head"><h4>Outcome distribution</h4><span class="tiny">Donut</span></div><div class="chart-wrap"><canvas id="chartDashboardOutcomes"></canvas></div></div><div class="chart-card"><div class="card-head"><h4>Monthly trend</h4><span class="tiny">Line</span></div><div class="chart-wrap"><canvas id="chartDashboardTrend"></canvas></div></div></div></section></section>');

lect></div><div class="field"><label>APGAR 1 min</label><input name="apgar_1" type="number" min="0" max="10" step="1" required value="'+escapeHtml(r.apgar_1)+'"></div><div class="field"><label>APGAR 5 min</label><input name="apgar_5" type="number" min="0" max="10" step="1" required value="'+escapeHtml(r.apgar_5)+'"></div><div class="field"><label>Respiratory Support</label><select name="respiratory_support" required>'+options(['','None','Oxygen','CPAP','Mechanical Ventilation','HFNC','Bag-Mask Resuscitation'],r.respiratory_support)+'</select></div><div class="field"><label>Sepsis / Infection Status</label><select name="sepsis_status" required>'+options(['','No evidence','Risk only','Suspected sepsis','Confirmed infection'],r.sepsis_status)+'</select></div><div class="field"><label>Feeding Type</label><select name="feeding_type" required>'+options(['','Exclusive breast milk','Mixed feeds','Formula','IV fluids / NPO','Tube feeding'],r.feeding_type)+'</select></div><div class="field"><label>Length of Stay (days)</label><input name="length_of_stay" type="number" min="0" max="365" step="1" required value="'+escapeHtml(r.length_of_stay)+'"></div><div class="field"><label>Outcome</label><select name="outcome" required>'+options(['','Discharged','Referred','Deceased','Ongoing'],r.outcome)+'</select></div><div class="field"><label>Detail (Mortality Classification)</label><select name="detail" required>'+options(['','16.1.1.a New born deaths within 24 hrs (1 to 23 hrs 59 min) at Facility/Transit','16.1.2.a New born deaths within 1 week (1 to 7 days) at Facility/Transit','16.1.3.a New born deaths within 8 to 28 days at Facility/Transit','16.1.4.a Infant deaths (>28 days to below 12 months) at Facility/Transit','16.2.1 Neonatal deaths 0 to 28 days due to Sepsis','16.2.2 Neonatal deaths 0 to 28 days due to Asphyxia','16.2.3 Neonatal deaths 0 to 28 days due to complications of Prematurity','16.2.4 Neonatal deaths 0 to 28 days due to Other causes'],r.detail)+'</select></div><div c       function render(){
        routeGuard();
        let html = '';
        if(!isAuthenticated()) html = authPage();
        else if(state.route==='dashboard') html = dashboardPage();
        else if(state.route==='new-record') html = recordFormPage();
        else if(state.route==='records') html = recordsPage();
        else if(state.route==='analytics') html = analyticsPage();
        else if(state.route==='reports') html = reportsPage();
        else if(state.route==='settings') html = settingsPage();
        else if(state.route==='about') html = aboutPage();
        else { saveRoute(isAuthenticated() ? 'dashboard' : 'login'); html = isAuthenticated() ? dashboardPage() : authPage(); }
        app.innerHTML = html;
        bindEvents();
        drawVisibleCharts();
      }

      function bindEvents(){
        app.querySelectorAll('[data-route]').forEach(btn => btn.addEventListener('click', () => { clearStatus(); saveRoute(btn.getAttribute('data-route')); render(); }));
        app.querySelectorAll('[data-auth-view]').forEach(btn => btn.addEventListener('click', () => { state.authView = btn.getAttribute('data-auth-view'); state.authStatus=''; state.authStatusType=''; render(); }));
        const authForm = document.getElementById('authForm');
        if(authForm){
          authForm.addEventListener('submit', async e => {
            e.preventDefault();
            const fd = new FormData(authForm);
            const email = String(fd.get('email')||'').trim();
            const password = String(fd.get('password')||'').trim();
            if(!email) return setStatus('Please enter your email address.', 'error', 'auth');
            state.loading = true; render();
            try{
              if(state.authView==='signin'){
                await signIn(email,password);
                saveRoute('dashboard');
                setStatus('Signed in successfully.', 'success', 'auth');
                await fetchRecords();
              } else if(state.authView==='signup'){
                const res = await signUp(email,password);
                if(res && res.access_token){ saveRoute('dashboard'); await fetchRecords(); setStatus('Account created and signed in.', 'success', 'auth'); }
                else setStatus('Sign-up submitted. Check your inbox/spam for verification email before signing in.', 'success', 'auth');
              } else {
                await forgotPassword(email);
                setStatus('Password reset sent. Open your email and follow the reset link, then return to sign in.', 'success', 'auth');
              }
            } catch(err){ const msg=(err && err.message)||''; const friendly=/Invalid login credentials/i.test(msg)?'Incorrect email or password.':(/Failed to fetch|NetworkError|network/i.test(msg)?'Network error. Check connection and try again.':(msg||'Authentication failed.')); setStatus(friendly, 'error', 'auth'); }
            state.loading = false; render();
          });
        }
        const googleSignIn = document.getElementById('googleSignIn'); if(googleSignIn) googleSignIn.addEventListener('click', async ()=>{ try{ await signInWithGoogle(); }catch(err){ setStatus(err.message || 'Google sign-in could not start.', 'error', 'auth'); } });
        const demoEntry = document.getElementById('demoEntry'); if(demoEntry) demoEntry.addEventListener('click', enterDemo);
                const pwd = document.getElementById('authPassword');
        const tgl = document.getElementById('togglePassword');
        if(pwd && tgl){ tgl.addEventListener('click', ()=>{ const isText = pwd.type==='text'; pwd.type = isText ? 'password' : 'text'; tgl.textContent = isText ? 'Show' : 'Hide'; }); }
        const goSetup = document.getElementById('goSetup'); if(goSetup) goSetup.addEventListener('click', ()=>{ enterDemo(); saveRoute('settings'); render(); });
        const goAbout = document.getElementById('goAbout'); if(goAbout) goAbout.addEventListener('click', ()=>{ enterDemo(); saveRoute('about'); render(); });
        const signOutBtn = document.getElementById('signOutBtn'); if(signOutBtn) signOutBtn.addEventListener('click', ()=>signOut(true));
        const seedDemo = document.getElementById('seedDemo'); if(seedDemo) seedDemo.addEventListener('click', ()=>{ if(confirm('This will overwrite current local records with sample data. Continue?')){ state.records = clone(sampleRecords); persist(KEYS.records,state.records); fetchRecords(); setStatus('Sample data reloaded.', 'success'); } });

        const configForm = document.getElementById('configForm');
        if(configForm){
          configForm.addEventListener('submit', e => {
            e.preventDefault();
            const fd = new FormData(configForm);
            state.config = {url:String(fd.get('url')||'').trim(), anonKey:String(fd.get('anonKey')||'').trim()};
            persist(KEYS.config, state.config);
            setStatus('Configuration saved locally.', 'success');
            render();
          });
          document.getElementById('clearConfig').addEventListener('click', ()=>{ if(confirm('Clear stored Supabase credentials?')){ state.config={url:'',anonKey:''}; persist(KEYS.config,state.config); setStatus('Configuration cleared.', 'success'); render(); } });
          document.getElementById('testConfig').addEventListener('click', async ()=>{
            state.loading=true; render();
            try{
              if(!isConfigured()) throw new Error('Enter both URL and anon key first.');
              await fetch(state.config.url.replace(/\/$/,'') + '/rest/v1/', {headers:getHeaders(false)});
              setStatus('Connection test sent. If your project exists, you can now sign in.', 'success');
            }catch(err){ setStatus('Connection test failed: ' + err.message, 'error'); }
            state.loading=false; render();
          });
        }

        const brandingForm = document.getElementById('brandingForm');
        if(brandingForm){
          brandingForm.addEventListener('submit', e => {
            e.preventDefault();
            const fd = new FormData(brandingForm);
            state.branding = {hospitalName:String(fd.get('hospitalName')||''),unitName:String(fd.get('unitName')||''),address:String(fd.get('address')||''),contact:String(fd.get('contact')||'')};
            persist(KEYS.branding,state.branding); setStatus('Branding updated.', 'success'); render();
          });
        }

        const recordForm = document.getElementById('recordForm'); if(recordForm){ attachValidationUX(recordForm);
          recordForm.addEventListener('submit', async e => {
            e.preventDefault(); clearValidationSummary(recordForm); if(!recordForm.checkValidity()){ recordForm.reportValidity(); showValidationSummary(recordForm,'Please complete all required fields highlighted below before saving.'); return; } const fd = new FormData(recordForm);
            const record = Object.fromEntries(fd.entries());
            ['gestational_age','birth_weight','apgar_1','apgar_5','length_of_stay','mother_age'].forEach(k => record[k]=num(record[k]));
            const err = validateRecord(record);
            if(err) return setStatus(err,'error');
            state.loading=true; render();
            if(record.admission_date && record.discharge_date && record.discharge_date < record.admission_date){ setStatus('Discharge date cannot be before admission date.', 'error'); state.loading=false; render(); return; } if(record.outcome && ['Discharged','Referred','Deceased'].includes(record.outcome) && !record.discharge_date){ setStatus('Please provide discharge date for selected outcome.', 'error'); state.loading=false; render(); return; } try{ await saveRecord(record); saveRoute('records'); setStatus('Record saved successfully.', 'success'); }
            catch(error){ setStatus(error.message || 'Could not save record.', 'error'); }
            state.loading=false; render();
          });
          const clearBtn = document.getElementById('clearRecordForm');
          if(clearBtn) clearBtn.addEventListener('click', ()=>{ if(confirm('Start fresh and clear entered values?')){ state.editingId=''; saveRoute('new-record'); render(); } });
        }

        const filterQ = document.getElementById('filterQ'); if(filterQ) filterQ.addEventListener('input', e=>{ state.filters.q=e.target.value; render(); });
        const filterOutcome = document.getElementById('filterOutcome'); if(filterOutcome) filterOutcome.addEventListener('change', e=>{ state.filters.outcome=e.target.value; render(); });
        const filterSex = document.getElementById('filterSex'); if(filterSex) filterSex.addEventListener('change', e=>{ state.filters.sex=e.target.value; render(); });
        const filterSupport = document.getElementById('filterSupport'); if(filterSupport) filterSupport.addEventListener('change', e=>{ state.filters.support=e.target.value; render(); });
        const clearFilters = document.getElementById('clearFilters'); if(clearFilters) clearFilters.addEventListener('click', ()=>{ state.filters={q:'',outcome:'',sex:'',support:''}; render(); });
        app.querySelectorAll('th[data-sort]').forEach(th => th.addEventListener('click', ()=>{ const key=th.getAttribute('data-sort'); if(state.sort.key===key) state.sort.dir = state.sort.dir==='asc' ? 'desc' : 'asc'; else { state.sort.key=key; state.sort.dir='asc'; } render(); }));
        app.querySelectorAll('[data-edit]').forEach(btn => btn.addEventListener('click', ()=>{ state.editingId = btn.getAttribute('data-edit'); saveRoute('new-record'); render(); }));
        app.querySelectorAll('[data-delete]').forEach(btn => btn.addEventListener('click', async ()=>{ const id = btn.getAttribute('data-delete'); if(confirm('Delete this record?')){ state.loading=true; render(); try{ await removeRecord(id); setStatus('Record deleted.', 'success'); }catch(err){ setStatus(err.message || 'Delete failed.', 'error'); } state.loading=false; render(); } }));
        const deleteAllDemo = document.getElementById('deleteAllDemo'); if(deleteAllDemo) deleteAllDemo.addEventListener('click', ()=>{ if(confirm('Delete all local demo records?')){ state.records=[]; persist(KEYS.records,state.records); setStatus('Local demo records deleted.', 'success'); render(); } });

        const exportJson = document.getElementById('exportJson'); if(exportJson) exportJson.addEventListener('click', ()=>download('nicu-records.json', JSON.stringify(state.records,null,2), 'application/json'));
        const exportCsv = document.getElementById('exportCsv'); if(exportCsv) exportCsv.addEventListener('click', ()=>download('nicu-records.csv', toCsv(state.records), 'text/csv'));
        const importFile = document.getElementById('importFile'); if(importFile) importFile.addEventListener('change', handleImport);

        app.querySelectorAll('[data-report-type]').forEach(btn => btn.addEventListener('click', ()=>{ state.report.type = btn.getAttribute('data-report-type'); render(); }));
        const reportFrom = document.getElementById('reportFrom'); if(reportFrom) reportFrom.addEventListener('change', e=>{ state.report.from=e.target.value; render(); });
        const reportTo = document.getElementById('reportTo'); if(reportTo) reportTo.addEventListener('change', e=>{ state.report.to=e.target.value; render(); });
        const reportPatient = document.getElementById('reportPatient'); if(reportPatient) reportPatient.addEventListener('change', e=>{ state.report.patientId=e.target.value; render(); });
        const printReport = document.getElementById('printReport'); if(printReport) printReport.addEventListener('click', ()=>{ const f=document.getElementById('reportFrom')?.value||''; const t=document.getElementById('reportTo')?.value||''; if(f && t && t < f){ setStatus('Invalid report range: To date must be after From date.', 'error'); return; } window.print(); });
        const refreshPreview = document.getElementById('refreshPreview'); if(refreshPreview) refreshPreview.addEventListener('click', ()=>render());
      }

            function showValidationSummary(form,msg){
        let box=form.querySelector('.form-validation-summary');
        if(!box){ box=document.createElement('div'); box.className='form-validation-summary status error'; box.style.marginBottom='12px'; form.prepend(box); }
        box.textContent=msg || 'Please complete all required fields.';
      }
      function clearValidationSummary(form){
        const box=form.querySelector('.form-validation-summary');
        if(box) box.remove();
      }
      function attachValidationUX(form){
        const fields=form.querySelectorAll('input,select,textarea');
        fields.forEach(f=>{
          f.addEventListener('invalid', ()=>{
            f.classList.add('invalid-field');
            const field=f.closest('.field') || f.parentElement;
            if(field && !field.querySelector('.inline-error')){
              const hint=document.createElement('div');
              hint.className='inline-error tiny';
              hint.style.color='#b42318';
              hint.style.marginTop='6px';
              hint.textContent='This field is required or has an invalid value.';
              field.appendChild(hint);
            }
          });
          f.addEventListener('input', ()=>{
            if(f.checkValidity()){
              f.classList.remove('invalid-field');
              const field=f.closest('.field') || f.parentElement;
              const hint=field ? field.querySelector('.inline-error') : null;
              if(hint) hint.remove();
            }
          });
        });
      }
      function validateRecord(r){
        if(!r.patient_id || !r.baby_name || !r.admission_date || !r.gestational_age || !r.birth_weight || !r.sex || !r.delivery_type || !r.diagnosis || !r.respiratory_support || !r.sepsis_status || !r.feeding_type || !r.outcome || !r.detail || !r.antenatal_steroids) return 'Please complete all required fields.';
        if(r.apgar_1 < 0 || r.apgar_1 > 10 || r.apgar_5 < 0 || r.apgar_5 > 10) return 'APGAR scores must be between 0 and 10.';
        if(r.gestational_age < 20 || r.gestational_age > 45) return 'Gestational age must be between 20 and 45 weeks.';
        if(r.birth_weight < 300 || r.birth_weight > 7000) return 'Birth weight must be between 300 and 7000 g.';
        const dup = state.records.find(x => String(x.patient_id).toLowerCase()===String(r.patient_id).toLowerCase() && String(x.id)!==String(state.editingId));
        if(dup) return 'Patient ID already exists. Use a unique value.';
        return '';
      }
      function download(name,content,type){ const blob=new Blob([content],{type}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(url),300); }
      function toCsv(rows){ const headers=['id','patient_id','baby_name','dob','gestational_age','birth_weight','sex','delivery_type','apgar_1','apgar_5','diagnosis','respiratory_support','sepsis_status','feeding_type','admission_date','discharge_date','length_of_stay','outcome','mother_age','antenatal_steroids','notes','created_by','created_at']; return [headers.join(',')].concat(rows.map(r=>headers.map(h=>csvCell(r[h])).join(','))).join('\n'); }
      function csvCell(v){ const s=String(v==null?'':v).replace(/"/g,'""'); return /[",\n]/.test(s)?'"'+s+'"':s; }
      function parseCsv(text){ const rows=[]; let row=[], cell='', q=false; for(let i=0;i<text.length;i++){ const ch=text[i], next=text[i+1]; if(ch==='"'){ if(q && next==='"'){ cell+='"'; i++; } else q=!q; } else if(ch===',' && !q){ row.push(cell); cell=''; } else if((ch==='\n'||ch==='\r') && !q){ if(ch==='\r' && next==='\n') i++; row.push(cell); if(row.some(v=>v!=='')) rows.push(row); row=[]; cell=''; } else cell+=ch; } if(cell.length || row.length){ row.push(cell); rows.push(row); } if(!rows.length) return []; const headers=rows[0].map(h=>h.trim()); return rows.slice(1).map(r=>{ const obj={}; headers.forEach((h,i)=>obj[h]=(r[i]||'').trim()); return obj; }); }
      async function handleImport(e){
        const file = e.target.files && e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = async ()=>{
          try{
            const text = String(reader.result||'');
            const incoming = file.name.toLowerCase().endsWith('.json') ? JSON.parse(text) : parseCsv(text);
            if(!Array.isArray(incoming) || !incoming.length) throw new Error('No valid records found in file.');
            const normalized = incoming.map(r => ({...r, gestational_age:num(r.gestational_age), birth_weight:num(r.birth_weight), apgar_1:num(r.apgar_1), apgar_5:num(r.apgar_5), length_of_stay:num(r.length_of_stay), mother_age:num(r.mother_age), id:r.id || uid()}));
            state.records = normalized.concat(state.records.filter(old => !normalized.some(n => String(n.patient_id).toLowerCase()===String(old.patient_id).toLowerCase())));
            persist(KEYS.records,state.records);
            setStatus('Imported '+normalized.length+' record(s) into local demo storage.', 'success');
            render();
          }catch(err){ setStatus(err.message || 'Import failed.', 'error'); render(); }
          e.target.value='';
        };
        reader.onerror = ()=>{ setStatus('Could not read the selected file.', 'error'); render(); e.target.value=''; };
        reader.readAsText(file);
      }

      function drawVisibleCharts(){
        if(document.getElementById('chartDashboardOutcomes')) drawDonut(document.getElementById('chartDashboardOutcomes'), countBy(state.records,'outcome'), ['#2d91cb','#52c3bf','#cf4f69','#c78322','#7eb7ff']);
        if(document.getElementById('chartDashboardTrend')) drawLine(document.getElementById('chartDashboardTrend'), monthlyTrend(state.records));
        if(document.getElementById('chartOutcomes')) drawDonut(document.getElementById('chartOutcomes'), countBy(state.records,'outcome'), ['#2d91cb','#52c3bf','#cf4f69','#c78322','#7eb7ff']);
        if(document.getElementById('chartSex')) drawDonut(document.getElementById('chartSex'), countBy(state.records,'sex'), ['#7ab8f6','#f1a3cf','#9dd8c7','#c4cbff']);
        if(document.getElementById('chartWeight')) drawBars(document.getElementById('chartWeight'), weightBands(state.records), '#7ab8f6');
        if(document.getElementById('chartSupport')) drawBars(document.getElementById('chartSupport'), countBy(state.records,'respiratory_support'), '#52c3bf');
        if(document.getElementById('chartTrend')) drawLine(document.getElementById('chartTrend'), monthlyTrend(state.records));
      }
      function setupCanvas(canvas){ const ratio=window.devicePixelRatio||1; const rect=canvas.getBoundingClientRect(); const width=Math.max(240,Math.floor(rect.width)); const height=Math.max(220,Math.floor(rect.height)); canvas.width=width*ratio; canvas.height=height*ratio; const ctx=canvas.getContext('2d'); ctx.setTransform(ratio,0,0,ratio,0,0); return {ctx,width,height}; }
      function drawEmpty(canvas,msg){ const {ctx,width,height}=setupCanvas(canvas); ctx.clearRect(0,0,width,height); ctx.fillStyle='#f2f8fb'; ctx.fillRect(0,0,width,height); ctx.fillStyle='#6b8394'; ctx.font='600 14px Inter'; ctx.textAlign='center'; ctx.fillText(msg,width/2,height/2); }
      function drawDonut(canvas,counts,colors){ const entries=Object.entries(counts).filter(([,v])=>v>0); if(!entries.length) return drawEmpty(canvas,'No data'); const {ctx,width,height}=setupCanvas(canvas); ctx.clearRect(0,0,width,height); const total=entries.reduce((s,[,v])=>s+v,0); const cx=width*.34, cy=height*.52, r=Math.min(width,height)*.28, inner=r*.58; let start=-Math.PI/2; entries.forEach(([label,val],i)=>{ const angle=(val/total)*Math.PI*2; ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,start+angle); ctx.closePath(); ctx.fillStyle=colors[i%colors.length]; ctx.fill(); start+=angle; }); ctx.globalCompositeOperation='destination-out'; ctx.beginPath(); ctx.arc(cx,cy,inner,0,Math.PI*2); ctx.fill(); ctx.globalCompositeOperation='source-over'; ctx.fillStyle='#163246'; ctx.font='800 24px Inter'; ctx.textAlign='center'; ctx.fillText(total,cx,cy+6); ctx.font='600 12px Inter'; ctx.fillStyle='#647f92'; ctx.fillText('records',cx,cy+24); let y=28; entries.forEach(([label,val],i)=>{ ctx.fillStyle=colors[i%colors.length]; ctx.beginPath(); ctx.arc(width*.68,y,6,0,Math.PI*2); ctx.fill(); ctx.fillStyle='#163246'; ctx.textAlign='left'; ctx.font='600 12px Inter'; ctx.fillText(label+' ('+val+')', width*.68+12, y+4); y+=24; }); }
      function drawBars(canvas,counts,color){ const entries=Object.entries(counts); if(!entries.length) return drawEmpty(canvas,'No data'); const {ctx,width,height}=setupCanvas(canvas); ctx.clearRect(0,0,width,height); const pad={t:18,r:16,b:54,l:34}, iw=width-pad.l-pad.r, ih=height-pad.t-pad.b; const max=Math.max(...entries.map(e=>e[1]),1); ctx.strokeStyle='#e4eef5'; for(let i=0;i<=4;i++){ const y=pad.t+ih-(ih*i/4); ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(width-pad.r,y); ctx.stroke(); ctx.fillStyle='#8aa0b1'; ctx.font='11px Inter'; ctx.textAlign='right'; ctx.fillText(Math.round(max*i/4), pad.l-6, y+4); } const barW=iw/entries.length*.62; entries.forEach(([label,val],i)=>{ const x=pad.l+(iw/entries.length)*i+(iw/entries.length-barW)/2; const h=max?(val/max)*ih:0; const y=pad.t+ih-h; const grad=ctx.createLinearGradient(0,y,0,y+h); grad.addColorStop(0,color); grad.addColorStop(1,'#d6f0f2'); roundRect(ctx,x,y,barW,h,12,true,false,grad); ctx.fillStyle='#163246'; ctx.font='700 11px Inter'; ctx.textAlign='center'; ctx.fillText(val,x+barW/2,y-6); ctx.fillStyle='#647f92'; wrapCenter(ctx,label,x+barW/2,height-28,iw/entries.length-10,12); }); }
      function drawLine(canvas,series){ if(!series.length) return drawEmpty(canvas,'No trend data'); const {ctx,width,height}=setupCanvas(canvas); ctx.clearRect(0,0,width,height); const pad={t:20,r:20,b:42,l:34}, iw=width-pad.l-pad.r, ih=height-pad.t-pad.b, max=Math.max(...series.map(s=>s.count),1); ctx.strokeStyle='#e4eef5'; for(let i=0;i<=4;i++){ const y=pad.t+ih-(ih*i/4); ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(width-pad.r,y); ctx.stroke(); ctx.fillStyle='#8aa0b1'; ctx.font='11px Inter'; ctx.textAlign='right'; ctx.fillText(Math.round(max*i/4), pad.l-6, y+4); } ctx.beginPath(); series.forEach((p,i)=>{ const x=pad.l+(iw*(series.length===1?.5:i/(series.length-1))); const y=pad.t+ih-(p.count/max)*ih; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }); ctx.strokeStyle='#2d91cb'; ctx.lineWidth=3; ctx.stroke(); ctx.lineTo(pad.l+iw,pad.t+ih); ctx.lineTo(pad.l,pad.t+ih); ctx.closePath(); const fill=ctx.createLinearGradient(0,pad.t,0,pad.t+ih); fill.addColorStop(0,'rgba(45,145,203,.22)'); fill.addColorStop(1,'rgba(45,145,203,.02)'); ctx.fillStyle=fill; ctx.fill(); series.forEach((p,i)=>{ const x=pad.l+(iw*(series.length===1?.5:i/(series.length-1))); const y=pad.t+ih-(p.count/max)*ih; ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill(); ctx.strokeStyle='#2d91cb'; ctx.lineWidth=3; ctx.stroke(); ctx.fillStyle='#163246'; ctx.font='700 11px Inter'; ctx.textAlign='center'; ctx.fillText(p.count,x,y-10); ctx.fillStyle='#647f92'; ctx.fillText(p.label,x,height-16); }); }
      function roundRect(ctx,x,y,w,h,r,fill,stroke,fillStyle){ const rr=Math.min(r,w/2,h/2); ctx.beginPath(); ctx.moveTo(x+rr,y); ctx.arcTo(x+w,y,x+w,y+h,rr); ctx.arcTo(x+w,y+h,x,y+h,rr); ctx.arcTo(x,y+h,x,y,rr); ctx.arcTo(x,y,x+w,y,rr); ctx.closePath(); if(fill){ ctx.fillStyle=fillStyle||ctx.fillStyle; ctx.fill(); } if(stroke) ctx.stroke(); }
      function wrapCenter(ctx,text,cx,y,maxWidth,lineHeight){ const words=String(text).split(' '); let line=''; const lines=[]; words.forEach(word=>{ const test=line?line+' '+word:word; if(ctx.measureText(test).width>maxWidth && line){ lines.push(line); line=word; } else line=test; }); if(line) lines.push(line); lines.slice(0,2).forEach((ln,i)=>ctx.fillText(ln,cx,y+(i*lineHeight))); }

      window.addEventListener('hashchange', ()=>{ state.route = location.hash.replace('#','') || state.route; render(); });
      window.addEventListener('online', ()=>{ setStatus('Back online. Sync should resume automatically.', 'success'); render(); });
      window.addEventListener('offline', ()=>{ setStatus('You are offline. You can still view cached local data.', ''); render(); });
      window.addEventListener('resize', ()=>{ clearTimeout(window.__nicuResize); window.__nicuResize = setTimeout(drawVisibleCharts, 120); });

      (async function init(){
        await refreshUser();
        if(isAuthenticated() && state.route !== 'login') await fetchRecords();
        render();
      })();
    })();
  </script>
<script id="goose-smooth-script">
(function(){
  function two(n){ return String(n).padStart(2,'0'); }
  function fmt(d){ return two(d.getHours())+':'+two(d.getMinutes())+':'+two(d.getSeconds())+'.'+String(Math.floor(d.getMilliseconds()/10)).padStart(2,'0'); }
  function gooseSmoothClockTick(){ var el=document.getElementById('smoothClock'); if(el){ el.textContent=fmt(new Date()); } requestAnimationFrame(gooseSmoothClockTick); }
  requestAnimationFrame(gooseSmoothClockTick);

  document.addEventListener('DOMContentLoaded', function(){
    var nodes=document.querySelectorAll('.card,.panel,.stat-card,section,canvas');
    nodes.forEach(function(n,i){
      n.style.opacity='0';
      n.style.transform='translateY(8px)';
      setTimeout(function(){
        n.style.transition=(n.style.transition? n.style.transition+',' : '') + 'opacity .45s ease, transform .45s ease';
        n.style.opacity='1';
        n.style.transform='translateY(0)';
      }, 40 + i*18);
    });
  });
})();
</script>
