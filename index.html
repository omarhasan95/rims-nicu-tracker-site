<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RIMS NICU Tracker</title>
    <!--
      Tailwind via CDN.  The official Play CDN compiles Tailwind on the fly in
      the browser so you can use the utility classes without a build step.
      See the Tailwind docs for more details: https://tailwindcss.com/docs/installation/play-cdn
    -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- React and ReactDOM UMD bundles for use with babel-standalone.  Using the
         development builds makes debugging easier.  You could switch to the
         production builds once everything is working. -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel stand‑alone compiler.  This allows us to write JSX directly in
         our script; Babel will compile it on the fly.  The preset for React
         transforms the JSX into calls to React.createElement. -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>
    <!-- The application code lives inside a <script type="text/babel"> block.
         Babel will compile this at runtime.  For larger projects it is
         recommended to use a proper build tool, but this approach keeps the
         example entirely self‑contained. -->
    <script type="text/babel">
      const { useState, useMemo, useEffect } = React;

      // --- Firebase configuration ---
      // These credentials are copied directly from the user‑provided code.  They
      // configure the app to connect anonymously to the "rims‑nicu‑tracker"
      // Firebase project.  See https://firebase.google.com/docs/web/setup for
      // more information.  Because this project uses anonymous authentication
      // there is no need for end‑user credentials.
      const firebaseConfig = {
        apiKey: "AIzaSyBHYARZ5NZIH3QUNOaVijmP8gvUQUfHdK8",
        authDomain: "rims-nicu-tracker.firebaseapp.com",
        projectId: "rims-nicu-tracker",
        storageBucket: "rims-nicu-tracker.firebasestorage.app",
        messagingSenderId: "330632025948",
        appId: "1:330632025948:web:353247817bf1138f359399",
        measurementId: "G-87Q44YRFDY"
      };

      // Lazy‑load Firebase modules as ES modules.  Firebase v9+ supports
      // modular imports which work in browsers without a bundler.  See
      // https://firebase.google.com/docs/web/compatibility?hl=en for details.
      async function loadFirebase() {
        const [{ initializeApp }, { getAuth, signInAnonymously, onAuthStateChanged }, { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc }] = await Promise.all([
          import('https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js'),
          import('https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js'),
          import('https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js'),
        ]);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        return { auth, db, signInAnonymously, onAuthStateChanged, collection, onSnapshot, doc, setDoc, deleteDoc };
      }

      // Application constants.  These define the statuses, diagnosis options
      // and the month labels used in the report table.
      const STATUS_OPTIONS = [
        { value: 'Admitted', label: 'Admitted (Currently in NICU/SNCU)', color: 'bg-blue-100 text-blue-800 border-blue-200' },
        { value: 'Discharged', label: 'Discharged', color: 'bg-green-100 text-green-800 border-green-200' },
        { value: 'Died', label: 'Death', color: 'bg-red-100 text-red-800 border-red-200' },
        { value: 'LAMA', label: 'LAMA', color: 'bg-orange-100 text-orange-800 border-orange-200' },
        { value: 'Transferred', label: 'Transfer out / Referral', color: 'bg-purple-100 text-purple-800 border-purple-200' }
      ];

      const DIAGNOSIS_OPTIONS = ['Pre Term', 'Severe Birth Asphyxia', 'SEPSIS', 'RDS', 'Others'];
      const MONTHS = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];

      // Utility to compute the age of the neonate in hours.  Returns null if
      // either timestamp is missing or invalid.
      function calculateHoursBetween(startStr, endStr) {
        if (!startStr || !endStr) return null;
        const start = new Date(startStr);
        const end = new Date(endStr);
        if (isNaN(start) || isNaN(end)) return null;
        return (end - start) / (1000 * 60 * 60);
      }

      // Convert a numeric age (in hours) into a Day of Life (DOL) string.  A
      // negative or null value yields "Invalid".  For hours less than 24
      // DOL 1 is used with the number of hours appended; otherwise the day
      // count increments from 1 and any remaining hours are shown.
      function formatAgeString(hours) {
        if (hours === null || hours < 0) return 'Invalid';
        if (hours < 24) return `DOL 1 (${Math.floor(hours)}h)`;
        const days = Math.floor(hours / 24);
        const rem = Math.floor(hours % 24);
        return `DOL ${days + 1} (${days}d ${rem}h)`;
      }

      // Badge component.  Displays a coloured status pill.  The colour is
      // determined by STATUS_OPTIONS.  Any unknown status defaults to the
      // first entry.
      function Badge({ status }) {
        const config = STATUS_OPTIONS.find(s => s.value === status) || STATUS_OPTIONS[0];
        return (
          <span className={`px-2.5 py-1 rounded-full text-xs font-medium border ${config.color}`}>{status}</span>
        );
      }

      // StatCard component.  Used to summarise counts at the top of the tracker
      // tab.  Icons have been replaced with simple emoji labels to avoid
      // external icon dependencies.
      function StatCard({ title, count, emoji, colorClass }) {
        return (
          <div className="bg-white rounded-xl shadow-sm border border-slate-100 p-6 flex items-center space-x-4 transition-all duration-300">
            <div className={`p-3 rounded-lg ${colorClass} text-xl`}>
              {emoji}
            </div>
            <div>
              <p className="text-sm font-medium text-slate-500">{title}</p>
              <h3 className="text-2xl font-bold text-slate-800">{count}</h3>
            </div>
          </div>
        );
      }

      // Top‑level application component.  Encapsulates the tracker UI and the
      // monthly report.  Because Firebase must be loaded asynchronously the
      // initial render shows a connecting state until authentication has
      // completed and the Firestore listener is set up.
      function App() {
        const [activeTab, setActiveTab] = useState('tracker');
        const [patients, setPatients] = useState([]);
        const [searchQuery, setSearchQuery] = useState('');
        const [filterStatus, setFilterStatus] = useState('All');
        const [user, setUser] = useState(null);
        const [isSyncing, setIsSyncing] = useState(true);
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [editingPatient, setEditingPatient] = useState(null);
        const [formData, setFormData] = useState({
          name: '',
          uhid: '',
          dob: '',
          admissionDate: '',
          unit: 'NICU',
          admissionType: 'Direct',
          diagnosis: DIAGNOSIS_OPTIONS[0],
          status: STATUS_OPTIONS[0].value,
          outcomeDate: '',
          notes: ''
        });

        // Reference to Firebase.  We capture it outside of React state so
        // functions defined within useEffect have access.  This avoids
        // reinitialising Firebase on every render.
        const firebaseRef = React.useRef(null);

        // On mount: load Firebase, sign in anonymously, and attach a
        // Firestore snapshot listener.  On cleanup the listener is removed.
        useEffect(() => {
          let unsubscribe = null;
          loadFirebase().then(({ auth, db, signInAnonymously, onAuthStateChanged, collection, onSnapshot, doc, setDoc, deleteDoc }) => {
            firebaseRef.current = { auth, db, signInAnonymously, onAuthStateChanged, collection, onSnapshot, doc, setDoc, deleteDoc };
            signInAnonymously(auth).catch(err => console.error('Auth error:', err));
            const unSubAuth = onAuthStateChanged(auth, currentUser => {
              setUser(currentUser);
            });
            // When the user is set we can listen to the patients collection
            unsubscribe = onSnapshot(collection(db, 'patients'), snapshot => {
              const fetched = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
              setPatients(fetched);
              setIsSyncing(false);
            }, (error) => {
              console.error('Data Sync Error:', error);
              setIsSyncing(false);
            });
          });
          return () => {
            if (unsubscribe) unsubscribe();
          };
        }, []);

        // Derived statistics for the summary cards
        const stats = useMemo(() => {
          return {
            total: patients.length,
            admitted: patients.filter(p => p.status === 'Admitted').length,
            discharged: patients.filter(p => p.status === 'Discharged').length,
            died: patients.filter(p => p.status === 'Died').length,
            lama: patients.filter(p => p.status === 'LAMA').length,
            transferred: patients.filter(p => p.status === 'Transferred').length,
          };
        }, [patients]);

        // Filtered patient list based on search query and selected status
        const filteredPatients = useMemo(() => {
          return patients.filter(p => {
            const matchesSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.uhid.toLowerCase().includes(searchQuery.toLowerCase());
            const matchesFilter = filterStatus === 'All' || p.status === filterStatus;
            return matchesSearch && matchesFilter;
          }).sort((a, b) => new Date(b.admissionDate) - new Date(a.admissionDate));
        }, [patients, searchQuery, filterStatus]);

        // Compute monthly report; this is memoised to avoid expensive recalculation
        // on every render
        const monthlyReport = useMemo(() => {
          return MONTHS.map((monthName, index) => {
            const monthPatients = patients.filter(p => {
              const d = new Date(p.admissionDate);
              return d.getMonth() === index;
            });
            const row = { month: monthName, patients: monthPatients };
            // Admission breakdown
            row.nicuAdmissions = monthPatients.filter(p => p.unit === 'NICU').length;
            row.sncuDirect = monthPatients.filter(p => p.unit === 'SNCU' && p.admissionType === 'Direct').length;
            row.sncuTransfer = monthPatients.filter(p => p.unit === 'SNCU' && p.admissionType === 'Transfer in').length;
            row.sncuTotal = row.sncuDirect + row.sncuTransfer;
            // Death breakdown
            row.nicuDeaths = monthPatients.filter(p => p.status === 'Died' && p.unit === 'NICU').length;
            row.sncuDeaths = monthPatients.filter(p => p.status === 'Died' && p.unit === 'SNCU').length;
            // Discharge breakdown
            row.nicuDischarge = monthPatients.filter(p => p.status === 'Discharged' && p.unit === 'NICU').length;
            row.sncuDischarge = monthPatients.filter(p => p.status === 'Discharged' && p.unit === 'SNCU').length;
            // LAMA & Transfers
            row.lama = monthPatients.filter(p => p.status === 'LAMA').length;
            row.transfer = monthPatients.filter(p => p.status === 'Transferred').length;
            // Diagnosis breakdown
            row.diagnosis = {};
            DIAGNOSIS_OPTIONS.forEach(diag => {
              const withDiag = monthPatients.filter(p => p.diagnosis === diag);
              row.diagnosis[diag] = {
                ta: withDiag.length,
                death: withDiag.filter(p => p.status === 'Died').length
              };
            });
            // Death timing breakdown
            const deaths = monthPatients.filter(p => p.status === 'Died');
            row.deathUnder24 = 0;
            row.death1to7d = 0;
            row.death8to28d = 0;
            row.deathOver28d = 0;
            deaths.forEach(p => {
              const hrs = calculateHoursBetween(p.dob, p.outcomeDate);
              if (hrs === null || hrs < 0) return;
              if (hrs < 24) {
                row.deathUnder24++;
              } else if (hrs >= 24 && hrs < 168) {
                row.death1to7d++;
              } else if (hrs >= 168 && hrs <= 672) {
                row.death8to28d++;
              } else {
                row.deathOver28d++;
              }
            });
            return row;
          });
        }, [patients]);

        // Open modal for new admission or editing.  Prefills fields accordingly.
        const handleOpenModal = (patient = null) => {
          if (patient) {
            setEditingPatient(patient);
            setFormData({ ...patient });
          } else {
            setEditingPatient(null);
            const today = new Date();
            const localDate = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
            setFormData({
              name: '',
              uhid: '',
              dob: '',
              admissionDate: localDate,
              unit: 'NICU',
              admissionType: 'Direct',
              diagnosis: DIAGNOSIS_OPTIONS[0],
              status: 'Admitted',
              outcomeDate: '',
              notes: ''
            });
          }
          setIsModalOpen(true);
        };

        // Close modal and reset editing state
        const handleCloseModal = () => {
          setIsModalOpen(false);
          setEditingPatient(null);
        };

        // Persist a patient record to Firestore.  If editing existing record
        // patient.id will be truthy so we update; otherwise we create a new
        // record using Date.now() as an id.
        const handleSave = async (e) => {
          e.preventDefault();
          if (!firebaseRef.current) return;
          const { db, setDoc, doc, collection } = firebaseRef.current;
          const patientId = editingPatient ? editingPatient.id : Date.now().toString();
          const payload = { ...formData, id: patientId };
          handleCloseModal();
          const patientsRef = collection(db, 'patients');
          await setDoc(doc(patientsRef, patientId), payload);
        };

        // Delete a patient record from Firestore.  Asks for confirmation via
        // window.confirm() before performing the deletion.
        const handleDelete = async (id) => {
          if (!firebaseRef.current) return;
          const { db, deleteDoc, doc, collection } = firebaseRef.current;
          if (window.confirm('Are you sure you want to delete this record? This will delete it for ALL doctors.')) {
            const patientsRef = collection(db, 'patients');
            await deleteDoc(doc(patientsRef, id));
          }
        };

        return (
          <div>
            {/* Header */}
            <header className="bg-white border-b border-slate-200 sticky top-0 z-10">
              <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
                <div className="flex items-center space-x-3">
                  <div className="bg-blue-600 p-2 rounded-lg text-white">🏥</div>
                  <h1 className="text-xl font-bold text-slate-900 hidden sm:block">RIMS NICU Tracker</h1>
                  <div className={`flex items-center space-x-1 px-2 py-1 rounded-full text-xs font-medium ml-2 ${isSyncing ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'}`}> 
                    <span>{isSyncing ? '⏳' : '✅'}</span>
                    <span className="hidden sm:inline">{isSyncing ? 'Connecting…' : 'Live Sync On'}</span>
                  </div>
                </div>
                <div className="flex bg-slate-100 p-1 rounded-lg">
                  <button onClick={() => setActiveTab('tracker')} className={`flex items-center space-x-2 px-3 sm:px-4 py-2 rounded-md text-xs sm:text-sm font-medium transition-colors ${activeTab === 'tracker' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`}>📋<span className="hidden sm:inline">Patient Tracker</span></button>
                  <button onClick={() => setActiveTab('report')} className={`flex items-center space-x-2 px-3 sm:px-4 py-2 rounded-md text-xs sm:text-sm font-medium transition-colors ${activeTab === 'report' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-600 hover:text-slate-900'}`}>📑<span className="hidden sm:inline">Monthly Report</span></button>
                </div>
                <button onClick={() => handleOpenModal()} className="bg-blue-600 hover:bg-blue-700 text-white px-3 sm:px-4 py-2 rounded-lg font-medium flex items-center space-x-2 transition-colors text-sm sm:text-base shadow-sm hover:shadow-md">➕<span className="hidden sm:inline">New Admission</span></button>
              </div>
            </header>
            <main className="max-w-[1400px] mx-auto px-4 sm:px-6 lg:px-8 py-8">
              {activeTab === 'tracker' && (
                <div className="animate-in fade-in duration-300">
                  {/* Statistics Dashboard */}
                  <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4 mb-8">
                    <StatCard title="Total" count={stats.total} emoji="👥" colorClass="bg-slate-100 text-slate-600" />
                    <StatCard title="Admitted" count={stats.admitted} emoji="🏥" colorClass="bg-blue-100 text-blue-600" />
                    <StatCard title="Discharged" count={stats.discharged} emoji="🏠" colorClass="bg-green-100 text-green-600" />
                    <StatCard title="Deaths" count={stats.died} emoji="💀" colorClass="bg-red-100 text-red-600" />
                    <StatCard title="LAMA" count={stats.lama} emoji="⚠️" colorClass="bg-orange-100 text-orange-600" />
                    <StatCard title="Transferred" count={stats.transferred} emoji="➡️" colorClass="bg-purple-100 text-purple-600" />
                  </div>
                  {/* Controls */}
                  <div className="bg-white p-4 rounded-xl shadow-sm border border-slate-100 flex flex-col lg:flex-row justify-between items-center space-y-4 lg:space-y-0 lg:space-x-4 mb-6">
                    <div className="relative w-full lg:w-96">
                      <span className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">🔍</span>
                      <input type="text" placeholder="Search by Name or UHID…" value={searchQuery} onChange={e => setSearchQuery(e.target.value)} className="w-full pl-8 pr-4 py-2 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
                    </div>
                    <div className="flex space-x-2 w-full lg:w-auto overflow-x-auto pb-2 sm:pb-0 hide-scrollbar">
                      {['All','Admitted','Discharged','Died','LAMA','Transferred'].map(status => (
                        <button key={status} onClick={() => setFilterStatus(status)} className={`px-4 py-2 rounded-lg text-sm font-medium whitespace-nowrap transition-colors ${filterStatus === status ? 'bg-slate-800 text-white' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>{status === 'Transferred' ? 'Transfer/Ref' : status}</button>
                      ))}
                    </div>
                  </div>
                  {/* Data Table */}
                  <div className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
                    <div className="overflow-x-auto">
                      <table className="min-w-full divide-y divide-slate-200">
                        <thead className="bg-slate-50">
                          <tr>
                            <th className="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Patient Details</th>
                            <th className="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Admission</th>
                            <th className="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Diagnosis</th>
                            <th className="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Status</th>
                            <th className="px-6 py-3 text-left text-xs font-semibold text-slate-500 uppercase tracking-wider">Outcome & Age</th>
                            <th className="px-6 py-3 text-right text-xs font-semibold text-slate-500 uppercase tracking-wider">Actions</th>
                          </tr>
                        </thead>
                        <tbody className="bg-white divide-y divide-slate-200">
                          {patients.length === 0 && !isSyncing ? (
                            <tr>
                              <td colSpan="6" className="px-6 py-16 text-center">
                                <div className="flex flex-col items-center justify-center space-y-3">
                                  <div className="p-4 bg-blue-50 text-blue-500 rounded-full">👥</div>
                                  <h3 className="text-lg font-medium text-slate-800">No Patients in Database</h3>
                                  <p className="text-slate-500 max-w-sm text-sm">Click “New Admission” above to start populating your cloud database. Updates will sync live with everyone viewing this app.</p>
                                </div>
                              </td>
                            </tr>
                          ) : filteredPatients.length === 0 ? (
                            <tr>
                              <td colSpan="6" className="px-6 py-12 text-center text-slate-500">{isSyncing ? 'Loading live database…' : 'No patients found matching your search criteria.'}</td>
                            </tr>
                          ) : (
                            filteredPatients.map(patient => {
                              const hrs = calculateHoursBetween(patient.dob, patient.outcomeDate);
                              return (
                                <tr key={patient.id} className="hover:bg-slate-50 transition-colors">
                                  <td className="px-6 py-4 whitespace-nowrap">
                                    <div className="font-medium text-slate-900">{patient.name}</div>
                                    <div className="text-sm text-slate-500">{patient.uhid}</div>
                                    {patient.dob && (
                                      <div className="text-xs text-slate-400 mt-0.5">DOB: {new Date(patient.dob).toLocaleString(undefined, { dateStyle: 'short', timeStyle: 'short' })}</div>
                                    )}
                                  </td>
                                  <td className="px-6 py-4 whitespace-nowrap">
                                    <div className="text-sm text-slate-900">{patient.admissionDate}</div>
                                    <div className="text-xs font-medium text-slate-500 mt-0.5">
                                      {patient.unit} {patient.unit === 'SNCU' ? `(${patient.admissionType})` : ''}
                                    </div>
                                  </td>
                                  <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-600">{patient.diagnosis}</td>
                                  <td className="px-6 py-4 whitespace-nowrap"><Badge status={patient.status} /></td>
                                  <td className="px-6 py-4 whitespace-nowrap text-sm text-slate-600">
                                    {patient.status !== 'Admitted' && patient.outcomeDate ? (
                                      <div>
                                        <div>{new Date(patient.outcomeDate).toLocaleString(undefined, { dateStyle: 'short', timeStyle: 'short' })}</div>
                                        {patient.dob && (
                                          <div className="text-xs font-medium text-blue-600 mt-1 bg-blue-50 inline-block px-2 py-0.5 rounded border border-blue-100">{formatAgeString(hrs)}</div>
                                        )}
                                      </div>
                                    ) : '-'}
                                  </td>
                                  <td className="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                    <button onClick={() => handleOpenModal(patient)} className="text-blue-600 hover:text-blue-900 p-2 inline-flex transition-colors rounded-md hover:bg-blue-50" title="Edit">✏️</button>
                                    <button onClick={() => handleDelete(patient.id)} className="text-red-600 hover:text-red-900 p-2 inline-flex ml-2 transition-colors rounded-md hover:bg-red-50" title="Delete">🗑️</button>
                                  </td>
                                </tr>
                              );
                            })
                          )}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}
              {/* MONTHLY REPORT TAB */}
              {activeTab === 'report' && (
                <div className="animate-in fade-in duration-300">
                  <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                    <div className="px-6 py-4 border-b border-slate-200 bg-slate-50 flex justify-between items-center">
                      <h2 className="text-lg font-bold text-slate-800">Mortality & Morbidity Report</h2>
                      {/* Export button placeholder; functionality could be added later */}
                      <button className="text-sm font-medium text-blue-600 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors border border-blue-200">Export CSV</button>
                    </div>
                    <div className="overflow-x-auto">
                      <table className="w-full text-sm text-left whitespace-nowrap border-collapse">
                        <thead className="bg-slate-100 text-slate-700 text-xs uppercase font-semibold border-b-2 border-slate-300">
                          <tr>
                            <th rowSpan="3" className="px-3 py-4 border border-slate-300 text-center sticky left-0 bg-slate-100 z-10 shadow-[1px_0_0_0_#cbd5e1]">Month</th>
                            <th colSpan="4" className="px-3 py-2 border border-slate-300 text-center bg-blue-50">Total No of Admission (NICU + SNCU)</th>
                            <th colSpan="2" className="px-3 py-2 border border-slate-300 text-center bg-red-50">Total No of Death</th>
                            <th colSpan="2" className="px-3 py-2 border border-slate-300 text-center bg-green-50">Discharge</th>
                            <th rowSpan="3" className="px-3 py-4 border border-slate-300 text-center align-bottom bg-orange-50">LAMA</th>
                            <th rowSpan="3" className="px-3 py-4 border border-slate-300 text-center align-bottom bg-purple-50">Transfer Out</th>
                            <th colSpan="10" className="px-3 py-2 border border-slate-300 text-center bg-yellow-50">Cause of Death (T.A / Death)</th>
                            <th colSpan="4" className="px-3 py-2 border border-slate-300 text-center bg-rose-50">Death Timing</th>
                          </tr>
                          <tr>
                            <th rowSpan="2" className="px-2 py-2 border border-slate-300 text-center bg-blue-50/50">NICU</th>
                            <th colSpan="3" className="px-2 py-2 border border-slate-300 text-center bg-blue-50/50">SNCU</th>
                            <th rowSpan="2" className="px-2 py-2 border border-slate-300 text-center bg-red-50/50">NICU</th>
                            <th rowSpan="2" className="px-2 py-2 border border-slate-300 text-center bg-red-50/50">SNCU</th>
                            <th rowSpan="2" className="px-2 py-2 border border-slate-300 text-center bg-green-50/50">NICU</th>
                            <th rowSpan="2" className="px-2 py-2 border border-slate-300 text-center bg-green-50/50">SNCU</th>
                            {DIAGNOSIS_OPTIONS.map(d => (
                              <th key={d} colSpan="2" className="px-2 py-2 border border-slate-300 text-center truncate max-w-[100px] bg-yellow-50/50" title={d}>{d}</th>
                            ))}
                            <th rowSpan="2" className="px-2 py-2 border border-slate-300 text-center bg-rose-50/50">&lt;24 hrs</th>
                            <th rowSpan="2" className="px-2 py-2 border border-slate-300 text-center bg-rose-50/50">24h - 7d</th>
                            <th rowSpan="2" className="px-2 py-2 border border-slate-300 text-center bg-rose-50/50">8d - 28d</th>
                            <th rowSpan="2" className="px-2 py-2 border border-slate-300 text-center bg-rose-50/50">&gt;28d</th>
                          </tr>
                          <tr>
                            <th className="px-2 py-2 border border-slate-300 text-center font-normal bg-white">Direct</th>
                            <th className="px-2 py-2 border border-slate-300 text-center font-normal bg-white">Transfer in</th>
                            <th className="px-2 py-2 border border-slate-300 text-center font-normal bg-white">Total</th>
                            {DIAGNOSIS_OPTIONS.map(d => (
                              <React.Fragment key={d + '_cols'}>
                                <th className="px-1 py-2 border border-slate-300 text-center text-[10px] bg-white">T.A</th>
                                <th className="px-1 py-2 border border-slate-300 text-center text-[10px] bg-white text-red-600">Death</th>
                              </React.Fragment>
                            ))}
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-200">
                          {monthlyReport.map(row => (
                            <tr key={row.month} className="hover:bg-blue-50/30 transition-colors">
                              <td className="px-3 py-2 border border-slate-200 font-semibold text-slate-800 sticky left-0 bg-white z-10 shadow-[1px_0_0_0_#e2e8f0]">{row.month}</td>
                              <td className="px-3 py-2 border border-slate-200 text-center bg-blue-50/10">{row.nicuAdmissions || ''}</td>
                              <td className="px-3 py-2 border border-slate-200 text-center bg-blue-50/10">{row.sncuDirect || ''}</td>
                              <td className="px-3 py-2 border border-slate-200 text-center bg-blue-50/10">{row.sncuTransfer || ''}</td>
                              <td className="px-3 py-2 border border-slate-200 text-center font-medium bg-blue-50/30">{row.sncuTotal || ''}</td>
                              <td className="px-3 py-2 border border-slate-200 text-center text-red-600 font-medium bg-red-50/10">{row.nicuDeaths || ''}</td>
                              <td className="px-3 py-2 border border-slate-200 text-center text-red-600 font-medium bg-red-50/10">{row.sncuDeaths || ''}</td>
                              <td className="px-3 py-2 border border-slate-200 text-center text-green-700 bg-green-50/10">{row.nicuDischarge || ''}</td>
                              <td className="px-3 py-2 border border-slate-200 text-center text-green-700 bg-green-50/10">{row.sncuDischarge || ''}</td>
                              <td className="px-3 py-2 border border-slate-200 text-center text-orange-600 bg-orange-50/10">{row.lama || ''}</td>
                              <td className="px-3 py-2 border border-slate-200 text-center text-purple-600 bg-purple-50/10">{row.transfer || ''}</td>
                              {DIAGNOSIS_OPTIONS.map(d => (
                                <React.Fragment key={d + '_' + row.month}>
                                  <td className="px-2 py-2 border border-slate-200 text-center text-slate-600">{row.diagnosis[d].ta || ''}</td>
                                  <td className="px-2 py-2 border border-slate-200 text-center text-red-600 font-medium">{row.diagnosis[d].death || ''}</td>
                                </React.Fragment>
                              ))}
                              <td className="px-3 py-2 border border-slate-200 text-center text-rose-700 bg-rose-50/10">{row.deathUnder24 || ''}</td>
                              <td className="px-3 py-2 border border-slate-200 text-center text-rose-700 bg-rose-50/10">{row.death1to7d || ''}</td>
                              <td className="px-3 py-2 border border-slate-200 text-center text-rose-700 bg-rose-50/10">{row.death8to28d || ''}</td>
                              <td className="px-3 py-2 border border-slate-200 text-center text-rose-700 bg-rose-50/10">{row.deathOver28d || ''}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                    <div className="p-4 bg-slate-50 border-t border-slate-200 text-xs text-slate-500">T.A = Total Admission for the given diagnosis. Blank cells indicate zero values for better readability.</div>
                  </div>
                </div>
              )}
            </main>
            {/* Add/Edit Modal */}
            {isModalOpen && (
              <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                <div className="bg-white rounded-2xl shadow-xl w-full max-w-2xl overflow-hidden animate-in fade-in zoom-in-95 duration-200 max-h-[90vh] flex flex-col">
                  <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                    <h2 className="text-xl font-bold text-slate-800 flex items-center">{editingPatient ? 'Update Patient Record' : 'New Admission'}</h2>
                    <button onClick={handleCloseModal} className="text-slate-400 hover:text-slate-600 p-1">✖️</button>
                  </div>
                    <form onSubmit={handleSave} className="p-6 space-y-5 overflow-y-auto">
                      <div className="space-y-4">
                        <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider border-b pb-2">1. Identity & Admission</h3>
                        <div className="grid grid-cols-2 gap-4">
                          <div className="col-span-2 sm:col-span-1">
                            <label className="block text-sm font-medium text-slate-700 mb-1">Patient Name</label>
                            <input required type="text" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="e.g. Baby of Jane" />
                          </div>
                          <div className="col-span-2 sm:col-span-1">
                            <label className="block text-sm font-medium text-slate-700 mb-1">UHID / File No.</label>
                            <input required type="text" value={formData.uhid} onChange={e => setFormData({...formData, uhid: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                          </div>
                          <div className="col-span-2 sm:col-span-1">
                            <label className="block text-sm font-medium text-slate-700 mb-1">Date & Time of Birth</label>
                            <input required type="datetime-local" value={formData.dob} onChange={e => setFormData({...formData, dob: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                          </div>
                          <div className="col-span-2 sm:col-span-1">
                            <label className="block text-sm font-medium text-slate-700 mb-1">Admission Date</label>
                            <input required type="date" value={formData.admissionDate} onChange={e => setFormData({...formData, admissionDate: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                          </div>
                        </div>
                        <div className="grid grid-cols-3 gap-4">
                          <div className="col-span-3 sm:col-span-1">
                            <label className="block text-sm font-medium text-slate-700 mb-1">Unit</label>
                            <select value={formData.unit} onChange={e => setFormData({...formData, unit: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                              <option value="NICU">NICU</option>
                              <option value="SNCU">SNCU</option>
                            </select>
                          </div>
                          <div className={`col-span-3 sm:col-span-1 transition-opacity ${formData.unit !== 'SNCU' ? 'opacity-50 pointer-events-none' : ''}`}> 
                            <label className="block text-sm font-medium text-slate-700 mb-1">Type (SNCU only)</label>
                            <select value={formData.admissionType} onChange={e => setFormData({...formData, admissionType: e.target.value})} disabled={formData.unit !== 'SNCU'} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                              <option value="Direct">Direct Admission</option>
                              <option value="Transfer in">Transfer in</option>
                            </select>
                          </div>
                          <div className="col-span-3 sm:col-span-1">
                            <label className="block text-sm font-medium text-slate-700 mb-1">Primary Diagnosis</label>
                            <select value={formData.diagnosis} onChange={e => setFormData({...formData, diagnosis: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                              {DIAGNOSIS_OPTIONS.map(d => <option key={d} value={d}>{d}</option>)}
                            </select>
                          </div>
                        </div>
                      </div>
                      <div className="space-y-4 pt-2">
                        <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider border-b pb-2">2. Clinical Outcome</h3>
                        <div className="grid grid-cols-2 gap-4">
                          <div className="col-span-2 sm:col-span-1">
                            <label className="block text-sm font-medium text-slate-700 mb-1">Current Status</label>
                            <select value={formData.status} onChange={e => { const newStatus = e.target.value; setFormData({ ...formData, status: newStatus, outcomeDate: newStatus === 'Admitted' ? '' : formData.outcomeDate }); }} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                              {STATUS_OPTIONS.map(opt => <option key={opt.value} value={opt.value}>{opt.label}</option>)}
                            </select>
                          </div>
                          {formData.status !== 'Admitted' && (
                            <div className="col-span-2 sm:col-span-1">
                              <label className="block text-sm font-medium text-slate-700 mb-1">Outcome Date & Time</label>
                              <input required type="datetime-local" value={formData.outcomeDate} onChange={e => setFormData({...formData, outcomeDate: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                          )}
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Clinical Notes (Optional)</label>
                          <textarea rows="2" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="Brief clinical summary…"></textarea>
                        </div>
                      </div>
                      <div className="pt-4 flex space-x-3 justify-end border-t border-slate-100">
                        <button type="button" onClick={handleCloseModal} className="px-4 py-2 text-slate-600 bg-slate-100 hover:bg-slate-200 rounded-lg font-medium transition-colors">Cancel</button>
                        <button type="submit" className="px-4 py-2 text-white bg-blue-600 hover:bg-blue-700 rounded-lg font-medium transition-colors flex items-center">💾 <span className="ml-2">{editingPatient ? 'Update Database' : 'Add to Database'}</span></button>
                      </div>
                    </form>
                </div>
              </div>
            )}
          </div>
        );
      }
      // Render the App into the #root div
      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
